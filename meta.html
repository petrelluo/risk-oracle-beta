<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ad Campaign Performance Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary-color: #2c3e50;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--primary-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .controls {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            background: var(--card-bg);
            padding: 15px 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        select {
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ddd;
            border-radius: 5px;
            outline: none;
            cursor: pointer;
        }
        .dashboard-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            width: 100%;
            max-width: 1200px;
            justify-content: center;
            align-items: stretch; /* Ensures both cards stretch to the same total height */
        }
        .chart-card {
            background: var(--card-bg);
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            flex: 1 1 500px;
            min-width: 300px;
            display: flex;
            flex-direction: column;
        }
        h2 {
            font-size: 1.2rem;
            text-align: center;
            margin-top: 0;
            margin-bottom: 20px;
            color: #555;
        }
        /* NEW: Forces both charts to be exactly this tall */
        .chart-wrapper {
            position: relative;
            height: 350px; 
            width: 100%;
            flex-grow: 1;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Ad Performance Explorer</h1>
        <p>Interactive breakdown of impressions, clicks, and spend.</p>
    </div>

    <div class="controls">
        <div>
            <label for="campaignSelect"><strong>Campaign:</strong></label>
            <select id="campaignSelect">
                <option value="All">All Campaigns</option>
                <option value="SAT Vocabulary">SAT Vocabulary</option>
                <option value="Fiji Water">Fiji Water</option>
            </select>
        </div>
        <div>
            <label for="metricSelect"><strong>Metric:</strong></label>
            <select id="metricSelect">
                <option value="impressions">Impressions</option>
                <option value="clicks">Clicks</option>
                <option value="spend">Spend ($)</option>
            </select>
        </div>
    </div>

    <div class="dashboard-container">
        <div class="chart-card">
            <h2>Performance by Age & Gender</h2>
            <div class="chart-wrapper">
                <canvas id="barChart"></canvas>
            </div>
        </div>
        <div class="chart-card">
            <h2>Performance by Publisher Platform</h2>
