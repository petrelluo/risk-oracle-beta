<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ad Campaign Performance Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary-color: #2c3e50;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--primary-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 30px;
            background: var(--card-bg);
            padding: 15px 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            justify-content: center;
        }
        select {
            padding: 10px;
            font-size: 14px;
            border: 1px solid #ddd;
            border-radius: 5px;
            outline: none;
            cursor: pointer;
            max-width: 300px;
        }
        .dashboard-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            width: 100%;
            max-width: 1200px;
            justify-content: center;
            align-items: stretch;
        }
        .chart-card {
            background: var(--card-bg);
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            flex: 1 1 45%; /* Adjusted to fit nicely */
            min-width: 300px;
            display: flex;
            flex-direction: column;
        }
        h2 {
            font-size: 1.2rem;
            text-align: center;
            margin-top: 0;
            margin-bottom: 20px;
            color: #555;
        }
        .chart-wrapper {
            position: relative;
            height: 350px; 
            width: 100%;
            flex-grow: 1;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Ad Performance Explorer</h1>
        <p>Interactive breakdown of exact campaign metrics.</p>
    </div>

    <div class="controls">
        <div>
            <label for="campaignSelect"><strong>Ad Campaign:</strong></label>
            <select id="campaignSelect">
                <option value="All">All Campaigns</option>
                <option value="120246070694980110">120246070694980110 | SAT Vocabulary Books</option>
                <option value="120246070776720110">120246070776720110 | Fiji Water Display</option>
                <option value="120246105632810110">120246105632810110 | Fiji Water Display</option>
            </select>
        </div>
        <div>
            <label for="metricSelect"><strong>Metric:</strong></label>
            <select id="metricSelect">
                <option value="impressions">Impressions</option>
                <option value="clicks">Clicks</option>
                <option value="spend">Spend ($)</option>
            </select>
        </div>
    </div>

    <div class="dashboard-container">
        <div class="chart-card" style="flex: 1 1 100%;">
            <h2>Performance by Age & Gender</h2>
            <div class="chart-wrapper" style="height: 400px;">
                <canvas id="barChart"></canvas>
            </div>
        </div>
        
        <div class="chart-card">
            <h2>Performance by Publisher Platform</h2>
            <div class="chart-wrapper">
                <canvas id="platformChart"></canvas>
            </div>
        </div>

        <div class="chart-card">
            <h2>Performance by Country</h2>
            <div class="chart-wrapper">
                <canvas id="countryChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        // --- EXACT ORIGINAL DATA ---
        
        // 1. Basic Performance by Age & Gender
        const rawDemoData = [
            { adId: '120246070694980110', age: '18-24', gender: 'male', impressions: 3, clicks: 0, spend: 0.02 },
            { adId: '120246070694980110', age: '25-34', gender: 'female', impressions: 22, clicks: 0, spend: 0.13 },
            { adId: '120246070694980110', age: '25-34', gender: 'male', impressions: 28, clicks: 0, spend: 0.15 },
            { adId: '120246070694980110', age: '35-44', gender: 'female', impressions: 42, clicks: 1, spend: 0.23 },
            { adId: '120246070694980110', age: '35-44', gender: 'male', impressions: 61, clicks: 1, spend: 0.53 },
            { adId: '120246070694980110', age: '45-54', gender: 'female', impressions: 23, clicks: 1, spend: 0.10 },
            { adId: '120246070694980110', age: '45-54', gender: 'male', impressions: 41, clicks: 1, spend: 0.24 },
            { adId: '120246070694980110', age: '45-54', gender: 'unknown', impressions: 1, clicks: 0, spend: 0.00 },
            { adId: '120246070694980110', age: '55-64', gender: 'female', impressions: 30, clicks: 0, spend: 0.17 },
            { adId: '120246070694980110', age: '55-64', gender: 'male', impressions: 24, clicks: 1, spend: 0.16 },
            { adId: '120246070694980110', age: '65+', gender: 'female', impressions: 55, clicks: 0, spend: 0.58 },
            { adId: '120246070694980110', age: '65+', gender: 'male', impressions: 40, clicks: 0, spend: 0.28 },
            { adId: '120246070694980110', age: '65+', gender: 'unknown', impressions: 2, clicks: 0, spend: 0.02 },
            
            { adId: '120246070776720110', age: '18-24', gender: 'female', impressions: 2, clicks: 0, spend: 0.01 },
            { adId: '120246070776720110', age: '18-24', gender: 'male', impressions: 1, clicks: 0, spend: 0.00 },
            { adId: '120246070776720110', age: '25-34', gender: 'female', impressions: 8, clicks: 0, spend: 0.06 },
            { adId: '120246070776720110', age: '25-34', gender: 'male', impressions: 14, clicks: 1, spend: 0.15 },
            { adId: '120246070776720110', age: '35-44', gender: 'female', impressions: 9, clicks: 1, spend: 0.11 },
            { adId: '120246070776720110', age: '35-44', gender: 'male', impressions: 26, clicks: 0, spend: 0.25 },
            { adId: '120246070776720110', age: '45-54', gender: 'female', impressions: 8, clicks: 4, spend: 0.48 },
            { adId: '120246070776720110', age: '45-54', gender: 'male', impressions: 10, clicks: 0, spend: 0.09 },
            { adId: '120246070776720110', age: '55-64', gender: 'female', impressions: 7, clicks: 2, spend: 0.08 },
            { adId: '120246070776720110', age: '55-64', gender: 'male', impressions: 9, clicks: 1, spend: 0.03 },
            { adId: '120246070776720110', age: '65+', gender: 'female', impressions: 20, clicks: 0, spend: 0.27 },
            { adId: '120246070776720110', age: '65+', gender: 'male', impressions: 27, clicks: 2, spend: 0.37 }
        ];

        // 2. Performance by Publisher Platform
        const rawPlatformData = [
            { adId: '120246070694980110', platform: 'facebook', impressions: 364, clicks: 5, spend: 2.599844 },
            { adId: '120246070694980110', platform: 'unknown', impressions: 8, clicks: 0, spend: 0.010156 },
            { adId: '120246070776720110', platform: 'facebook', impressions: 141, clicks: 11, spend: 1.9 },
            { adId: '120246105632810110', platform: 'audience_network', impressions: 99, clicks: 1, spend: 0.35 },
            { adId: '120246105632810110', platform: 'facebook', impressions: 15, clicks: 0, spend: 0.1 },
            { adId: '120246105632810110', platform: 'instagram', impressions: 24, clicks: 0, spend: 0.14 }
        ];

        // 3. Performance by Country
        const rawCountryData = [
            { adId: '120246070694980110', country: 'US', impressions: 372, clicks: 5, spend: 2.61 },
            { adId: '120246070776720110', country: 'US', impressions: 141, clicks: 11, spend: 1.90 },
            { adId: '120246105632810110', country: 'US', impressions: 138, clicks: 1, spend: 0.59 }
        ];

        // --- CHART INITIALIZATION ---
        let barChart, platformChart, countryChart;
        const ages = ['18-24', '25-34', '35-44', '45-54', '55-64', '65+'];
        const colors = { female: '#FF6B6B', male: '#4ECDC4', unknown: '#95A5A6' };
        const donutColors = ['#3b5998', '#E1306C', '#f39c12', '#95A5A6'];

        function initCharts() {
            // Age & Gender Bar Chart
            const barCtx = document.getElementById('barChart').getContext('2d');
            barChart = new Chart(barCtx, {
                type: 'bar',
                data: { labels: ages, datasets: [] },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false, 
                    scales: { y: { beginAtZero: true } } 
                }
            });

            // Platform Donut Chart
            const platCtx = document.getElementById('platformChart').getContext('2d');
            platformChart = new Chart(platCtx, {
                type: 'doughnut',
                data: { labels: [], datasets: [] },
                options: { responsive: true, maintainAspectRatio: false }
            });

            // Country Bar Chart
            const countryCtx = document.getElementById('countryChart').getContext('2d');
            countryChart = new Chart(countryCtx, {
                type: 'bar',
                data: { labels: [], datasets: [] },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false,
                    scales: { y: { beginAtZero: true } },
                    plugins: { legend: { display: false } }
                }
            });

            updateCharts(); 
        }

        // --- DATA PROCESSING & UPDATING ---
        function updateCharts() {
            const selectedAdId = document.getElementById('campaignSelect').value;
            const metric = document.getElementById('metricSelect').value;

            // Helper function to filter by selected ad ID
            const filterByAd = (dataArray) => {
                return selectedAdId === 'All' ? dataArray : dataArray.filter(d => d.adId === selectedAdId);
            };

            // 1. Process Bar Chart Data (Age & Gender)
            const filteredDemo = filterByAd(rawDemoData);
            const getGenderData = (genderStr) => {
                return ages.map(age => {
                    return filteredDemo
                        .filter(d => d.age === age && d.gender === genderStr)
                        .reduce((sum, item) => sum + item[metric], 0);
                });
            };

            barChart.data.datasets = [
                { label: 'Female', data: getGenderData('female'), backgroundColor: colors.female },
                { label: 'Male', data: getGenderData('male'), backgroundColor: colors.male },
                { label: 'Unknown', data: getGenderData('unknown'), backgroundColor: colors.unknown }
            ];
            barChart.update();

            // 2. Process Platform Chart Data
            const filteredPlatform = filterByAd(rawPlatformData);
            const platforms = [...new Set(filteredPlatform.map(d => d.platform))];
            const platformValues = platforms.map(plat => {
                return filteredPlatform
                    .filter(d => d.platform === plat)
                    .reduce((sum, item) => sum + item[metric], 0);
            });

            const cleanPlatLabels = platforms.map(p => p.replace('_', ' ').replace(/\b\w/g, l => l.toUpperCase()));
            platformChart.data.labels = cleanPlatLabels;
            platformChart.data.datasets = [{
                data: platformValues,
                backgroundColor: donutColors.slice(0, platforms.length)
            }];
            platformChart.update();

            // 3. Process Country Chart Data
            const filteredCountry = filterByAd(rawCountryData);
            const countries = [...new Set(filteredCountry.map(d => d.country))];
            const countryValues = countries.map(c => {
                return filteredCountry
                    .filter(d => d.country === c)
                    .reduce((sum, item) => sum + item[metric], 0);
            });

            countryChart.data.labels = countries;
            countryChart.data.datasets = [{
                label: metric.charAt(0).toUpperCase() + metric.slice(1),
                data: countryValues,
                backgroundColor: '#2ecc71'
            }];
            countryChart.update();
        }

        // --- EVENT LISTENERS ---
        document.getElementById('campaignSelect').addEventListener('change', updateCharts);
        document.getElementById('metricSelect').addEventListener('change', updateCharts);

        // Run on load
        window.onload = initCharts;
    </script>
</body>
</html>
