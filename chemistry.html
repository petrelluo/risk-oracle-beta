<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chemistry Formula & Name Quiz</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .card {
            background-color: #ffffff;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 550px;
            width: 100%;
        }
        h1 {
            margin-top: 0;
            color: #1a365d;
            font-size: 1.8rem;
            margin-bottom: 1rem;
        }
        
        /* Stats Header Styles */
        .stats-row {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }
        .stat-box {
            font-size: 1.1rem;
            font-weight: bold;
            padding: 0.5rem 1rem;
            border-radius: 8px;
        }
        .score-box {
            color: #2b6cb0;
            background-color: #ebf8ff;
            border: 1px solid #bee3f8;
        }
        .mastery-box {
            color: #276749;
            background-color: #f0fff4;
            border: 1px solid #c6f6d5;
            transition: all 0.3s ease;
        }
        .mastery-complete {
            background-color: #38a169;
            color: white;
            border-color: #2f855a;
        }

        .instruction {
            color: #718096;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
        }
        #question-prompt {
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
            color: #4a5568;
        }
        #target {
            font-size: 1.5rem;
            font-weight: bold;
            color: #2b6cb0;
            margin-bottom: 1.5rem;
            min-height: 36px;
        }
        input[type="text"] {
            width: 80%;
            padding: 0.75rem;
            font-size: 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 6px;
            margin-bottom: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus {
            border-color: #3182ce;
        }
        
        /* Button Styles */
        .btn-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }
        button {
            background-color: #3182ce;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            font-size: 1rem;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
            font-weight: bold;
        }
        button:hover { background-color: #2b6cb0; }
        
        button.secondary {
            background-color: #e2e8f0;
            color: #4a5568;
        }
        button.secondary:hover { background-color: #cbd5e0; }

        button.danger {
            background-color: #fed7d7;
            color: #c53030;
        }
        button.danger:hover { background-color: #feb2b2; }

        #feedback {
            margin-top: 1rem;
            font-size: 1.1rem;
            font-weight: bold;
            min-height: 24px;
        }
        .correct { color: #38a169; }
        .incorrect { color: #e53e3e; }

        /* Mistakes Table Styles */
        .hidden { display: none !important; }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1.5rem;
            margin-bottom: 1.5rem;
            text-align: left;
            font-size: 0.95rem;
        }
        th, td {
            padding: 10px;
            border-bottom: 1px solid #e2e8f0;
        }
        th {
            background-color: #f7fafc;
            color: #4a5568;
            font-weight: bold;
        }
        .mistake-count {
            font-weight: bold;
            color: #e53e3e;
            text-align: center;
        }
        .empty-state {
            color: #718096;
            font-style: italic;
            margin: 2rem 0;
        }
    </style>
</head>
<body>

    <div class="card" id="quiz-screen">
        <h1>Chemistry Quiz</h1>
        
        <div class="stats-row">
            <div class="stat-box score-box">Score: <span id="score">0</span></div>
            <div class="stat-box mastery-box" id="mastery-container">Mastered: <span id="mastery-count">0</span> / <span id="mastery-total">0</span></div>
        </div>

        <p class="instruction">Formulas don't need subscripts (e.g., Al2(SO4)3).</p>
        
        <div id="question-prompt">Loading question...</div>
        <div id="target"></div>
        
        <input type="text" id="answer-input" placeholder="Type answer here..." autocomplete="off">
        
        <div class="btn-group">
            <button id="submit-btn">Submit</button>
            <button id="review-btn" class="secondary">Review Mistakes</button>
        </div>
        
        <div id="feedback"></div>
    </div>

    <div class="card hidden" id="mistakes-screen">
        <h1>Top 10 Mistakes</h1>
        <p class="instruction">Questions you miss most frequently appear more often in the quiz.</p>
        
        <div id="mistakes-container">
            </div>

        <div class="btn-group">
            <button id="back-btn">Back to Quiz</button>
            <button id="reset-btn" class="danger">Reset Progress</button>
        </div>
    </div>

    <script>
        // The ultimate chemical data dictionary
        const chemicals = [

            { formula: "Mg(NO3)2", name: "Magnesium nitrate" },

            { formula: "(NH4)2S", name: "Ammonium sulfide" },
            { formula: "BaCO3", name: "Barium carbonate" },
            { formula: "MgI2", name: "Magnesium iodide" },
            { formula: "Cs2CO3", name: "Cesium carbonate" },
            { formula: "SiC", name: "Silicon carbide" },
            { formula: "FeO", name: "Iron(II) oxide" },
            { formula: "Al(OH)3", name: "Aluminum hydroxide" },
            { formula: "Fe2O3", name: "Iron(III) oxide" },
            { formula: "CuCl", name: "Copper(I) chloride" },
            { formula: "CaCrO4", name: "Calcium chromate" },
            { formula: "CrF3", name: "Chromium(III) fluoride" },
            { formula: "FeSO4", name: "Iron(II) sulfate" },
            { formula: "Pb3(PO4)2", name: "Lead(II) phosphate" },
            { formula: "Cu(OH)2", name: "Copper(II) hydroxide" },
            { formula: "Al2S3", name: "Aluminum sulfide" },
            { formula: "NH4NO3", name: "Ammonium nitrate" },
            { formula: "Mg3(PO4)2", name: "Magnesium phosphate" },
            { formula: "KClO3", name: "Potassium chlorate" },
            { formula: "Fe(OH)3", name: "Iron(III) hydroxide" },
            { formula: "SbF5", name: "Antimony pentafluoride" },
            { formula: "CaS", name: "Calcium sulfide" },
            { formula: "LiF", name: "Lithium fluoride" },
            { formula: "CS2", name: "Carbon disulfide" },
            { formula: "CuCO3", name: "Copper(II) carbonate" },
            { formula: "SiO2", name: "Silicon dioxide" },
            { formula: "Fe(NO3)3", name: "Iron(III) nitrate" },
            { formula: "CCl4", name: "Carbon tetrachloride" },
            { formula: "MgSO4", name: "Magnesium sulfate" },
            { formula: "Ca(OH)2", name: "Calcium hydroxide" },
            { formula: "XeF6", name: "Xenon hexafluoride" },
            { formula: "KMnO4", name: "Potassium permanganate" },
            { formula: "Ba(OH)2", name: "Barium hydroxide" },
            { formula: "CBr4", name: "Carbon tetrabromide" },
            { formula: "CO2", name: "Carbon dioxide" },
            { formula: "SCl4", name: "Sulfur tetrachloride" },
            { formula: "K2SO4", name: "Potassium sulfate" },
            { formula: "NaNO2", name: "Sodium nitrite" },
            { formula: "CuCl2", name: "Copper(II) chloride" },
            { formula: "KI", name: "Potassium iodide" },
            { formula: "SrBr2", name: "Strontium bromide" },
            { formula: "Rb2O", name: "Rubidium oxide" },
            { formula: "Na3N", name: "Sodium nitride" },
            { formula: "FeSO3", name: "Iron(II) sulfite" },
            { formula: "Cs2SO4", name: "Cesium sulfate" },
            { formula: "Cu3PO3", name: "Copper(I) phosphite" },
            { formula: "Ag2CO3", name: "Silver carbonate" },
            { formula: "LiNO3", name: "Lithium nitrate" },
            { formula: "KClO2", name: "Potassium chlorite" },
            { formula: "Ni2CO3", name: "Nickel(I) carbonate" },
            { formula: "KOH", name: "Potassium hydroxide" },
            { formula: "Ba(C2H3O2)2", name: "Barium acetate" },
            { formula: "CaI2", name: "Calcium iodide" },
            { formula: "SnS2", name: "Tin(IV) sulfide" },
            { formula: "Zn(CN)2", name: "Zinc cyanide" },
            { formula: "(NH4)3P", name: "Ammonium phosphide" },
            { formula: "Li2CO3", name: "Lithium carbonate" },
            { formula: "Al(C2H3O2)3", name: "Aluminum acetate" },
            { formula: "NH4F", name: "Ammonium fluoride" },
            { formula: "Sr(NO3)2", name: "Strontium nitrate" },
            { formula: "Cs2Se", name: "Cesium selenide" },
            { formula: "Li3As", name: "Lithium arsenide" },
            { formula: "NaF", name: "Sodium fluoride" },
            { formula: "Cs2O", name: "Cesium oxide" },
            { formula: "Ca(NO3)2", name: "Calcium nitrate" },
            { formula: "Li2S", name: "Lithium sulfide" },
            { formula: "AlPO4", name: "Aluminum phosphate" },
            { formula: "MgCO3", name: "Magnesium carbonate" },
            { formula: "(NH4)2SO4", name: "Ammonium sulfate" },
            { formula: "Zn(OH)2", name: "Zinc hydroxide" },
            { formula: "Cs3N", name: "Cesium nitride" },
            { formula: "Li2SO4", name: "Lithium sulfate" },
            { formula: "Cs2S", name: "Cesium sulfide" },
            { formula: "Rb3P", name: "Rubidium phosphide" },
            { formula: "Na3PO3", name: "Sodium phosphite" },
            { formula: "AgC2H3O2", name: "Silver acetate" },
            { formula: "Sr3P2", name: "Strontium phosphide" },
            { formula: "BaSO4", name: "Barium sulfate" },
            { formula: "Cd(NO2)2", name: "Cadmium nitrite" },
            { formula: "MgO", name: "Magnesium oxide" },
            { formula: "AgCN", name: "Silver cyanide" },
            { formula: "AlBr3", name: "Aluminum bromide" },
            { formula: "K2CrO4", name: "Potassium chromate" },
            { formula: "Li2C2O4", name: "Lithium oxalate" },
            { formula: "Ni3PO4", name: "Nickel(I) phosphate" },
            { formula: "MnO", name: "Manganese(II) oxide" },
            { formula: "CrF2", name: "Chromium(II) fluoride" },
            { formula: "VI2", name: "Vanadium(II) iodide" },
            { formula: "Na3P", name: "Sodium phosphide" },
            { formula: "NiS", name: "Nickel(II) sulfide" },
            { formula: "Pb3N2", name: "Lead(II) nitride" },
            { formula: "CuNO3", name: "Copper(I) nitrate" },
            { formula: "SrS", name: "Strontium sulfide" },
            { formula: "Fe2(CrO4)3", name: "Iron(III) chromate" },
            { formula: "SnSO3", name: "Tin(II) sulfite" },
            { formula: "BiF5", name: "Bismuth(V) fluoride" },
            { formula: "AlP", name: "Aluminum phosphide" },
            { formula: "CuOH", name: "Copper(I) hydroxide" },
            { formula: "P2O5", name: "Diphosphorus pentoxide" },
            { formula: "N2O3", name: "Dinitrogen trioxide" },
            { formula: "S2F10", name: "Disulfur decafluoride" },
            { formula: "OF2", name: "Oxygen difluoride" },
            { formula: "H2O", name: "Water (Dihydrogen monoxide)" },
            { formula: "SCl6", name: "Sulfur hexachloride" },
            { formula: "Ni(OH)2", name: "Nickel(II) hydroxide" },
            { formula: "Al2(CO3)3", name: "Aluminum carbonate" },
            { formula: "Fe2(SO4)3", name: "Iron(III) sulfate" },
            { formula: "Cu(ClO4)2", name: "Copper(II) perchlorate" }
        ];

        // App state variables
        let appData = {
            deck: [],
            mistakes: {},
            score: 0
        };
        let currentCard = null;

        // DOM Elements
        const quizScreen = document.getElementById('quiz-screen');
        const mistakesScreen = document.getElementById('mistakes-screen');
        const promptEl = document.getElementById('question-prompt');
        const targetEl = document.getElementById('target');
        const inputEl = document.getElementById('answer-input');
        const submitBtn = document.getElementById('submit-btn');
        const reviewBtn = document.getElementById('review-btn');
        const backBtn = document.getElementById('back-btn');
        const resetBtn = document.getElementById('reset-btn');
        const feedbackEl = document.getElementById('feedback');
        const scoreEl = document.getElementById('score');
        const masteryCountEl = document.getElementById('mastery-count');
        const masteryTotalEl = document.getElementById('mastery-total');
        const masteryContainer = document.getElementById('mastery-container');
        const mistakesContainer = document.getElementById('mistakes-container');

        // --- Initialization & Data Management ---

        function initData() {
            const savedData = localStorage.getItem('chemistryQuizData');
            
            if (savedData) {
                appData = JSON.parse(savedData);
                
                // Safety check: If they loaded old saved data with only 20 cards, force a reset to get all 200+ cards
                if(appData.deck.length < chemicals.length * 2) {
                    buildNewDeck();
                }
            } else {
                buildNewDeck();
            }
            scoreEl.textContent = appData.score;
            masteryTotalEl.textContent = appData.deck.length;
            updateMasteryDisplay();
        }

        function buildNewDeck() {
            appData.deck = [];
            appData.mistakes = {};
            appData.score = 0;
            scoreEl.textContent = 0;

            // Create 2 cards per chemical (one asking for name, one for formula)
            chemicals.forEach((chem, index) => {
                appData.deck.push({ id: `f-${index}`, item: chem, askFor: 'formula', weight: 10 });
                appData.deck.push({ id: `n-${index}`, item: chem, askFor: 'name', weight: 10 });
            });
            
            masteryTotalEl.textContent = appData.deck.length;
            saveData();
            updateMasteryDisplay();
        }

        function saveData() {
            localStorage.setItem('chemistryQuizData', JSON.stringify(appData));
        }

        function updateMasteryDisplay() {
            // A card is "mastered" if its weight has been reduced to the minimum (1)
            const masteredCards = appData.deck.filter(card => card.weight === 1).length;
            masteryCountEl.textContent = masteredCards;

            // Add a visual flair if the user achieves 100% mastery
            if (masteredCards === appData.deck.length && appData.deck.length > 0) {
                masteryContainer.classList.add('mastery-complete');
            } else {
                masteryContainer.classList.remove('mastery-complete');
            }
        }

        // --- Quiz Logic ---

        function generateQuestion() {
            feedbackEl.textContent = "";
            feedbackEl.className = "";
            inputEl.value = "";
            inputEl.focus();
            inputEl.disabled = false;
            submitBtn.disabled = false;

            // Spaced Repetition: Weighted Random Selection
            let totalWeight = appData.deck.reduce((sum, card) => sum + card.weight, 0);
            let randomNum = Math.random() * totalWeight;
            
            for (let card of appData.deck) {
                randomNum -= card.weight;
                if (randomNum <= 0) {
                    currentCard = card;
                    break;
                }
            }

            if (!currentCard) currentCard = appData.deck[0]; 

            if (currentCard.askFor === "formula") {
                promptEl.textContent = "What is the formula for:";
                targetEl.textContent = currentCard.item.name;
            } else {
                promptEl.textContent = "What is the name of:";
                targetEl.textContent = currentCard.item.formula;
            }
        }

        function checkAnswer() {
            const userAnswer = inputEl.value.trim();
            if (userAnswer === "") return; 

            inputEl.disabled = true;
            submitBtn.disabled = true;

            const correctAnswer = currentCard.askFor === "formula" ? currentCard.item.formula : currentCard.item.name;
            const isCorrect = userAnswer.toLowerCase() === correctAnswer.toLowerCase();

            if (isCorrect) {
                appData.score++; 
                // Decrease weight (min weight is 1)
                currentCard.weight = Math.max(1, currentCard.weight - 3);

                scoreEl.textContent = appData.score; 
                feedbackEl.textContent = "Correct! Well done.";
                feedbackEl.className = "correct";
                
                updateMasteryDisplay();
                saveData();
                setTimeout(generateQuestion, 1200);
            } else {
                appData.score--; 
                // Increase weight heavily on mistakes
                currentCard.weight += 15;

                scoreEl.textContent = appData.score; 
                feedbackEl.textContent = `Incorrect. The correct answer is: ${correctAnswer}`;
                feedbackEl.className = "incorrect";

                // Track Mistake
                const questionAsked = `${promptEl.textContent} ${targetEl.textContent}`;
                if (!appData.mistakes[questionAsked]) {
                    appData.mistakes[questionAsked] = {
                        question: questionAsked,
                        correctAnswer: correctAnswer,
                        count: 0
                    };
                }
                appData.mistakes[questionAsked].count++;
                
                updateMasteryDisplay();
                saveData();
                setTimeout(generateQuestion, 3000);
            }
        }

        // --- UI Flow & Event Listeners ---

        function showMistakes() {
            quizScreen.classList.add('hidden');
            mistakesScreen.classList.remove('hidden');

            const sortedMistakes = Object.values(appData.mistakes)
                                         .sort((a, b) => b.count - a.count)
                                         .slice(0, 10); 

            if (sortedMistakes.length === 0) {
                mistakesContainer.innerHTML = '<p class="empty-state">No mistakes recorded yet! Keep up the good work.</p>';
                return;
            }

            let tableHTML = `
                <table>
                    <thead>
                        <tr>
                            <th>Question</th>
                            <th>Correct Answer</th>
                            <th style="text-align: center;">Misses</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            sortedMistakes.forEach(mistake => {
                tableHTML += `
                    <tr>
                        <td>${mistake.question}</td>
                        <td><strong>${mistake.correctAnswer}</strong></td>
                        <td class="mistake-count">${mistake.count}</td>
                    </tr>
                `;
            });

            tableHTML += `</tbody></table>`;
            mistakesContainer.innerHTML = tableHTML;
        }

        function hideMistakes() {
            mistakesScreen.classList.add('hidden');
            quizScreen.classList.remove('hidden');
            inputEl.focus();
        }

        function resetProgress() {
            if(confirm("Are you sure you want to reset your score, mistakes, and spaced-repetition progress?")) {
                buildNewDeck();
                hideMistakes();
                generateQuestion();
            }
        }

        submitBtn.addEventListener('click', checkAnswer);
        reviewBtn.addEventListener('click', showMistakes);
        backBtn.addEventListener('click', hideMistakes);
        resetBtn.addEventListener('click', resetProgress);
        
        inputEl.addEventListener('keypress', function(event) {
            if (event.key === 'Enter' && !inputEl.disabled) {
                checkAnswer();
            }
        });

        // Start App
        initData();
        generateQuestion();
    </script>
</body>
</html>
