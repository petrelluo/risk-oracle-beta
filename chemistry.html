<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chemistry Formula & Name Quiz</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .card {
            background-color: #ffffff;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 550px;
            width: 100%;
        }
        h1 {
            margin-top: 0;
            color: #1a365d;
            font-size: 1.8rem;
            margin-bottom: 1rem;
        }
        
        /* Stats Header Styles */
        .stats-row {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }
        .stat-box {
            font-size: 1.1rem;
            font-weight: bold;
            padding: 0.5rem 1rem;
            border-radius: 8px;
        }
        .score-box {
            color: #2b6cb0;
            background-color: #ebf8ff;
            border: 1px solid #bee3f8;
        }
        .mastery-box {
            color: #276749;
            background-color: #f0fff4;
            border: 1px solid #c6f6d5;
            transition: all 0.3s ease;
        }
        .mastery-complete {
            background-color: #38a169;
            color: white;
            border-color: #2f855a;
        }

        .instruction {
            color: #718096;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
        }
        #question-prompt {
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
            color: #4a5568;
        }
        #target {
            font-size: 1.5rem;
            font-weight: bold;
            color: #2b6cb0;
            margin-bottom: 1.5rem;
            min-height: 36px;
        }
        input[type="text"] {
            width: 80%;
            padding: 0.75rem;
            font-size: 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 6px;
            margin-bottom: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus {
            border-color: #3182ce;
        }
        
        /* Button Styles */
        .btn-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }
        button {
            background-color: #3182ce;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            font-size: 1rem;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
            font-weight: bold;
        }
        button:hover { background-color: #2b6cb0; }
        
        button.secondary {
            background-color: #e2e8f0;
            color: #4a5568;
        }
        button.secondary:hover { background-color: #cbd5e0; }

        button.danger {
            background-color: #fed7d7;
            color: #c53030;
        }
        button.danger:hover { background-color: #feb2b2; }

        #feedback {
            margin-top: 1rem;
            font-size: 1.1rem;
            font-weight: bold;
            min-height: 24px;
        }
        .correct { color: #38a169; }
        .incorrect { color: #e53e3e; }

        /* Mistakes Table Styles */
        .hidden { display: none !important; }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1.5rem;
            margin-bottom: 1.5rem;
            text-align: left;
            font-size: 0.95rem;
        }
        th, td {
            padding: 10px;
            border-bottom: 1px solid #e2e8f0;
        }
        th {
            background-color: #f7fafc;
            color: #4a5568;
            font-weight: bold;
        }
        .mistake-count {
            font-weight: bold;
            color: #e53e3e;
            text-align: center;
        }
        .empty-state {
            color: #718096;
            font-style: italic;
            margin: 2rem 0;
        }
    </style>
</head>
<body>

    <div class="card" id="quiz-screen">
        <h1>Chemistry Quiz</h1>
        
        <div class="stats-row">
            <div class="stat-box score-box">Score: <span id="score">0</span></div>
            <div class="stat-box mastery-box" id="mastery-container">Mastered: <span id="mastery-count">0</span> / <span id="mastery-total">20</span></div>
        </div>

        <p class="instruction">Formulas don't need subscripts (e.g., Al2(SO4)3).</p>
        
        <div id="question-prompt">Loading question...</div>
        <div id="target"></div>
        
        <input type="text" id="answer-input" placeholder="Type answer here..." autocomplete="off">
        
        <div class="btn-group">
            <button id="submit-btn">Submit</button>
            <button id="review-btn" class="secondary">Review Mistakes</button>
        </div>
        
        <div id="feedback"></div>
    </div>

    <div class="card hidden" id="mistakes-screen">
        <h1>Top 10 Mistakes</h1>
        <p class="instruction">Questions you miss most frequently appear more often in the quiz.</p>
        
        <div id="mistakes-container">
            </div>

        <div class="btn-group">
            <button id="back-btn">Back to Quiz</button>
            <button id="reset-btn" class="danger">Reset Progress</button>
        </div>
    </div>

    <script>
        // The core chemical data
        const chemicals = [
            { name: "Aluminum Sulfate", formula: "Al2(SO4)3" },
            { name: "Magnesium nitrate", formula: "Mg(NO3)2" },
            { name: "Sodium chloride", formula: "NaCl" },
            { name: "Nitrogen trioxide", formula: "NO3" },
            { name: "Carbon monoxide", formula: "CO" },
            { name: "Manganese(IV) oxide", formula: "MnO2" },
            { name: "Sulfur dioxide", formula: "SO2" },
            { name: "Potassium sulfide", formula: "K2S" },
            { name: "Silver chlorate", formula: "AgClO3" },
            { name: "Ammonium sulfide", formula: "(NH4)2S" }
        ];

        // App state variables
        let appData = {
            deck: [],
            mistakes: {},
            score: 0
        };
        let currentCard = null;

        // DOM Elements
        const quizScreen = document.getElementById('quiz-screen');
        const mistakesScreen = document.getElementById('mistakes-screen');
        const promptEl = document.getElementById('question-prompt');
        const targetEl = document.getElementById('target');
        const inputEl = document.getElementById('answer-input');
        const submitBtn = document.getElementById('submit-btn');
        const reviewBtn = document.getElementById('review-btn');
        const backBtn = document.getElementById('back-btn');
        const resetBtn = document.getElementById('reset-btn');
        const feedbackEl = document.getElementById('feedback');
        const scoreEl = document.getElementById('score');
        const masteryCountEl = document.getElementById('mastery-count');
        const masteryTotalEl = document.getElementById('mastery-total');
        const masteryContainer = document.getElementById('mastery-container');
        const mistakesContainer = document.getElementById('mistakes-container');

        // --- Initialization & Data Management ---

        function initData() {
            const savedData = localStorage.getItem('chemistryQuizData');
            
            if (savedData) {
                appData = JSON.parse(savedData);
            } else {
                buildNewDeck();
            }
            scoreEl.textContent = appData.score;
            masteryTotalEl.textContent = appData.deck.length;
            updateMasteryDisplay();
        }

        function buildNewDeck() {
            appData.deck = [];
            appData.mistakes = {};
            appData.score = 0;
            scoreEl.textContent = 0;

            // Create 2 cards per chemical (one asking for name, one for formula)
            chemicals.forEach((chem, index) => {
                appData.deck.push({ id: `f-${index}`, item: chem, askFor: 'formula', weight: 10 });
                appData.deck.push({ id: `n-${index}`, item: chem, askFor: 'name', weight: 10 });
            });
            
            masteryTotalEl.textContent = appData.deck.length;
            saveData();
            updateMasteryDisplay();
        }

        function saveData() {
            localStorage.setItem('chemistryQuizData', JSON.stringify(appData));
        }

        function updateMasteryDisplay() {
            // A card is "mastered" if its weight has been reduced to the minimum (1)
            const masteredCards = appData.deck.filter(card => card.weight === 1).length;
            masteryCountEl.textContent = masteredCards;

            // Add a visual flair if the user achieves 100% mastery
            if (masteredCards === appData.deck.length && appData.deck.length > 0) {
                masteryContainer.classList.add('mastery-complete');
            } else {
                masteryContainer.classList.remove('mastery-complete');
            }
        }

        // --- Quiz Logic ---

        function generateQuestion() {
            feedbackEl.textContent = "";
            feedbackEl.className = "";
            inputEl.value = "";
            inputEl.focus();
            inputEl.disabled = false;
            submitBtn.disabled = false;

            // Spaced Repetition: Weighted Random Selection
            let totalWeight = appData.deck.reduce((sum, card) => sum + card.weight, 0);
            let randomNum = Math.random() * totalWeight;
            
            for (let card of appData.deck) {
                randomNum -= card.weight;
                if (randomNum <= 0) {
                    currentCard = card;
                    break;
                }
            }

            if (!currentCard) currentCard = appData.deck[0]; 

            if (currentCard.askFor === "formula") {
                promptEl.textContent = "What is the formula for:";
                targetEl.textContent = currentCard.item.name;
            } else {
                promptEl.textContent = "What is the name of:";
                targetEl.textContent = currentCard.item.formula;
            }
        }

        function checkAnswer() {
            const userAnswer = inputEl.value.trim();
            if (userAnswer === "") return; 

            inputEl.disabled = true;
            submitBtn.disabled = true;

            const correctAnswer = currentCard.askFor === "formula" ? currentCard.item.formula : currentCard.item.name;
            const isCorrect = userAnswer.toLowerCase() === correctAnswer.toLowerCase();

            if (isCorrect) {
                appData.score++; 
                // Decrease weight (min weight is 1)
                currentCard.weight = Math.max(1, currentCard.weight - 3);

                scoreEl.textContent = appData.score; 
                feedbackEl.textContent = "Correct! Well done.";
                feedbackEl.className = "correct";
                
                updateMasteryDisplay();
                saveData();
                setTimeout(generateQuestion, 1200);
            } else {
                appData.score--; 
                // Increase weight heavily on mistakes
                currentCard.weight += 15;

                scoreEl.textContent = appData.score; 
                feedbackEl.textContent = `Incorrect. The correct answer is: ${correctAnswer}`;
                feedbackEl.className = "incorrect";

                // Track Mistake
                const questionAsked = `${promptEl.textContent} ${targetEl.textContent}`;
                if (!appData.mistakes[questionAsked]) {
                    appData.mistakes[questionAsked] = {
                        question: questionAsked,
                        correctAnswer: correctAnswer,
                        count: 0
                    };
                }
                appData.mistakes[questionAsked].count++;
                
                updateMasteryDisplay();
                saveData();
                setTimeout(generateQuestion, 3000);
            }
        }

        // --- UI Flow & Event Listeners ---

        function showMistakes() {
            quizScreen.classList.add('hidden');
            mistakesScreen.classList.remove('hidden');

            const sortedMistakes = Object.values(appData.mistakes)
                                         .sort((a, b) => b.count - a.count)
                                         .slice(0, 10); 

            if (sortedMistakes.length === 0) {
                mistakesContainer.innerHTML = '<p class="empty-state">No mistakes recorded yet! Keep up the good work.</p>';
                return;
            }

            let tableHTML = `
                <table>
                    <thead>
                        <tr>
                            <th>Question</th>
                            <th>Correct Answer</th>
                            <th style="text-align: center;">Misses</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            sortedMistakes.forEach(mistake => {
                tableHTML += `
                    <tr>
                        <td>${mistake.question}</td>
                        <td><strong>${mistake.correctAnswer}</strong></td>
                        <td class="mistake-count">${mistake.count}</td>
                    </tr>
                `;
            });

            tableHTML += `</tbody></table>`;
            mistakesContainer.innerHTML = tableHTML;
        }

        function hideMistakes() {
            mistakesScreen.classList.add('hidden');
            quizScreen.classList.remove('hidden');
            inputEl.focus();
        }

        function resetProgress() {
            if(confirm("Are you sure you want to reset your score, mistakes, and spaced-repetition progress?")) {
                buildNewDeck();
                hideMistakes();
                generateQuestion();
            }
        }

        submitBtn.addEventListener('click', checkAnswer);
        reviewBtn.addEventListener('click', showMistakes);
        backBtn.addEventListener('click', hideMistakes);
        resetBtn.addEventListener('click', resetProgress);
        
        inputEl.addEventListener('keypress', function(event) {
            if (event.key === 'Enter' && !inputEl.disabled) {
                checkAnswer();
            }
        });

        // Start App
        initData();
        generateQuestion();
    </script>
</body>
</html>
