<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chemistry Formula & Name Quiz</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .card {
            background-color: #ffffff;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 550px;
            width: 100%;
        }
        h1 {
            margin-top: 0;
            color: #1a365d;
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }
        .score-container {
            font-size: 1.2rem;
            font-weight: bold;
            color: #2b6cb0;
            margin-bottom: 1.5rem;
            background-color: #ebf8ff;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            display: inline-block;
            border: 1px solid #bee3f8;
        }
        .instruction {
            color: #718096;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
        }
        #question-prompt {
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
            color: #4a5568;
        }
        #target {
            font-size: 1.5rem;
            font-weight: bold;
            color: #2b6cb0;
            margin-bottom: 1.5rem;
            min-height: 36px;
        }
        input[type="text"] {
            width: 80%;
            padding: 0.75rem;
            font-size: 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 6px;
            margin-bottom: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus {
            border-color: #3182ce;
        }
        
        /* Button Styles */
        .btn-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 1rem;
        }
        button {
            background-color: #3182ce;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            font-size: 1rem;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
            font-weight: bold;
        }
        button:hover { background-color: #2b6cb0; }
        
        button.secondary {
            background-color: #e2e8f0;
            color: #4a5568;
        }
        button.secondary:hover { background-color: #cbd5e0; }

        #feedback {
            margin-top: 1rem;
            font-size: 1.1rem;
            font-weight: bold;
            min-height: 24px;
        }
        .correct { color: #38a169; }
        .incorrect { color: #e53e3e; }

        /* Mistakes Table Styles */
        .hidden { display: none !important; }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1.5rem;
            margin-bottom: 1.5rem;
            text-align: left;
            font-size: 0.95rem;
        }
        th, td {
            padding: 10px;
            border-bottom: 1px solid #e2e8f0;
        }
        th {
            background-color: #f7fafc;
            color: #4a5568;
            font-weight: bold;
        }
        .mistake-count {
            font-weight: bold;
            color: #e53e3e;
            text-align: center;
        }
        .empty-state {
            color: #718096;
            font-style: italic;
            margin: 2rem 0;
        }
    </style>
</head>
<body>

    <div class="card" id="quiz-screen">
        <h1>Chemistry Quiz</h1>
        <div class="score-container">Score: <span id="score">0</span></div>
        <p class="instruction">Type your answer below. Formulas don't need subscripts (e.g., Al2(SO4)3).</p>
        
        <div id="question-prompt">Loading question...</div>
        <div id="target"></div>
        
        <input type="text" id="answer-input" placeholder="Type answer here..." autocomplete="off">
        
        <div class="btn-group">
            <button id="submit-btn">Submit</button>
            <button id="review-btn" class="secondary">Review Mistakes</button>
        </div>
        
        <div id="feedback"></div>
    </div>

    <div class="card hidden" id="mistakes-screen">
        <h1>Top 10 Mistakes</h1>
        <p class="instruction">Here are the questions you've missed the most during this session.</p>
        
        <div id="mistakes-container">
            </div>

        <button id="back-btn">Back to Quiz</button>
    </div>

    <script>
        // The chemical data
        const chemicals = [
            { name: "Aluminum Sulfate", formula: "Al2(SO4)3" },
            { name: "Magnesium nitrate", formula: "Mg(NO3)2" },
            { name: "Sodium chloride", formula: "NaCl" },
            { name: "Nitrogen trioxide", formula: "NO3" },
            { name: "Carbon monoxide", formula: "CO" },
            { name: "Manganese(IV) oxide", formula: "MnO2" },
            { name: "Sulfur dioxide", formula: "SO2" },
            { name: "Potassium sulfide", formula: "K2S" },
            { name: "Silver chlorate", formula: "AgClO3" },
            { name: "Ammonium sulfide", formula: "(NH4)2S" }
        ];

        // App state
        let currentItem = {};
        let askingFor = ""; 
        let correctAnswer = "";
        let score = 0; 
        
        // Dictionary to track mistakes. Key: Question string, Value: Object with details
        let mistakesTracker = {}; 

        // DOM Elements
        const quizScreen = document.getElementById('quiz-screen');
        const mistakesScreen = document.getElementById('mistakes-screen');
        const promptEl = document.getElementById('question-prompt');
        const targetEl = document.getElementById('target');
        const inputEl = document.getElementById('answer-input');
        const submitBtn = document.getElementById('submit-btn');
        const reviewBtn = document.getElementById('review-btn');
        const backBtn = document.getElementById('back-btn');
        const feedbackEl = document.getElementById('feedback');
        const scoreEl = document.getElementById('score');
        const mistakesContainer = document.getElementById('mistakes-container');

        // Function to start a new round
        function generateQuestion() {
            feedbackEl.textContent = "";
            feedbackEl.className = "";
            inputEl.value = "";
            inputEl.focus();
            inputEl.disabled = false;
            submitBtn.disabled = false;

            const randomIndex = Math.floor(Math.random() * chemicals.length);
            currentItem = chemicals[randomIndex];

            const isAskingFormula = Math.random() < 0.5;

            if (isAskingFormula) {
                askingFor = "formula";
                promptEl.textContent = "What is the formula for:";
                targetEl.textContent = currentItem.name;
                correctAnswer = currentItem.formula;
            } else {
                askingFor = "name";
                promptEl.textContent = "What is the name of:";
                targetEl.textContent = currentItem.formula;
                correctAnswer = currentItem.name;
            }
        }

        // Function to check the user's input
        function checkAnswer() {
            const userAnswer = inputEl.value.trim();
            if (userAnswer === "") return; 

            // Disable input briefly to prevent spamming enter
            inputEl.disabled = true;
            submitBtn.disabled = true;

            if (userAnswer.toLowerCase() === correctAnswer.toLowerCase()) {
                score++; 
                scoreEl.textContent = score; 
                feedbackEl.textContent = "Correct! Well done.";
                feedbackEl.className = "correct";
                setTimeout(generateQuestion, 1200);
            } else {
                score--; 
                scoreEl.textContent = score; 
                feedbackEl.textContent = `Incorrect. The correct answer is: ${correctAnswer}`;
                feedbackEl.className = "incorrect";

                // --- TRACK MISTAKE ---
                const questionAsked = `${promptEl.textContent} ${targetEl.textContent}`;
                if (!mistakesTracker[questionAsked]) {
                    mistakesTracker[questionAsked] = {
                        question: questionAsked,
                        correctAnswer: correctAnswer,
                        count: 0
                    };
                }
                mistakesTracker[questionAsked].count++;
                // ---------------------

                setTimeout(generateQuestion, 2500);
            }
        }

        // Function to render the mistakes table
        function showMistakes() {
            // Hide quiz, show mistakes
            quizScreen.classList.add('hidden');
            mistakesScreen.classList.remove('hidden');

            // Convert tracker object to an array and sort by count (highest to lowest)
            const sortedMistakes = Object.values(mistakesTracker)
                                         .sort((a, b) => b.count - a.count)
                                         .slice(0, 10); // Grab top 10

            if (sortedMistakes.length === 0) {
                mistakesContainer.innerHTML = '<p class="empty-state">No mistakes yet! You are doing great.</p>';
                return;
            }

            // Build HTML table
            let tableHTML = `
                <table>
                    <thead>
                        <tr>
                            <th>Question</th>
                            <th>Correct Answer</th>
                            <th style="text-align: center;">Misses</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            sortedMistakes.forEach(mistake => {
                tableHTML += `
                    <tr>
                        <td>${mistake.question}</td>
                        <td><strong>${mistake.correctAnswer}</strong></td>
                        <td class="mistake-count">${mistake.count}</td>
                    </tr>
                `;
            });

            tableHTML += `</tbody></table>`;
            mistakesContainer.innerHTML = tableHTML;
        }

        // Function to return to the quiz
        function hideMistakes() {
            mistakesScreen.classList.add('hidden');
            quizScreen.classList.remove('hidden');
            inputEl.focus();
        }

        // Event Listeners
        submitBtn.addEventListener('click', checkAnswer);
        reviewBtn.addEventListener('click', showMistakes);
        backBtn.addEventListener('click', hideMistakes);
        
        inputEl.addEventListener('keypress', function(event) {
            if (event.key === 'Enter' && !inputEl.disabled) {
                checkAnswer();
            }
        });

        // Initialize the first question on load
        generateQuestion();
    </script>
</body>
</html>
