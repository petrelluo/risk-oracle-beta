<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中文阅读 - 语音朗读播放器</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg: #f1f5f9;
            --surface: #ffffff;
            --text-main: #334155;
            --highlight: #fef08a;
        }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .player-container {
            max-width: 800px;
            width: 100%;
            background: var(--surface);
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        /* 顶部文章选择器区域 */
        .header-bar {
            background: #f8fafc;
            padding: 15px 20px;
            border-bottom: 1px solid #cbd5e1;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header-bar select {
            flex-grow: 1;
            padding: 10px;
            font-size: 1.1rem;
            border: 2px solid #cbd5e1;
            border-radius: 6px;
            outline: none;
            cursor: pointer;
            font-family: inherit;
        }
        
        .header-bar select:focus {
            border-color: var(--primary);
        }

        /* 控制栏样式 */
        .controls-bar {
            background: #e2e8f0;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
            position: sticky;
            top: 0;
            z-index: 10;
            border-bottom: 1px solid #cbd5e1;
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: background 0.2s;
        }

        .btn:hover { background: var(--primary-hover); }
        .btn:disabled { background: #94a3b8; cursor: not-allowed; }

        .control-group {
            display: flex;
            align-items: center;
            gap: 10px;
            background: white;
            padding: 6px 12px;
            border-radius: 6px;
            border: 1px solid #cbd5e1;
        }

        input[type="range"] { cursor: pointer; }
        
        .loop-control {
            display: flex;
            align-items: center;
            gap: 5px;
            font-weight: bold;
            cursor: pointer;
        }

        /* 文本区域样式 */
        .text-content {
            padding: 30px 40px;
            font-size: 1.15rem;
            line-height: 2;
            color: #1e293b;
            min-height: 300px;
            max-height: 60vh;
            overflow-y: auto;
            scroll-behavior: smooth;
        }

        p {
            margin-top: 0;
            margin-bottom: 1.5em;
            text-indent: 2em;
        }

        .sentence {
            transition: background-color 0.2s ease;
            border-radius: 3px;
            padding: 0 2px;
        }

        .sentence.highlight {
            background-color: var(--highlight);
            color: #000;
            box-shadow: 0 0 0 2px var(--highlight);
        }
    </style>
</head>
<body>

    <div class="player-container">
        
        <div class="header-bar">
            <label for="articleSelect" style="font-weight: bold; white-space: nowrap;">阅读篇目:</label>
            <select id="articleSelect"></select>
        </div>

        <div class="controls-bar">
            <button class="btn" id="playBtn">▶ 播放</button>
            <button class="btn" id="pauseBtn" disabled>⏸ 暂停</button>
            <button class="btn" id="stopBtn" disabled>⏹ 停止</button>
            
            <div class="control-group">
                <label for="speedRate">语速: <span id="speedValue">1.0</span>x</label>
                <input type="range" id="speedRate" min="0.5" max="2.0" step="0.1" value="1.0">
            </div>

            <label class="loop-control">
                <input type="checkbox" id="loopCheck" checked>
                循环播放
            </label>
        </div>

        <div class="text-content" id="textContent"></div>
    </div>

    <script>
        // --- 1. 数据配置：文章列表 ---
        const articles = [
            {
                title: "指南针 (四大发明)",
                content: `指南针是中国古代“四大发明”之一。
在指南针发明以前，人们在茫茫大海上航行，只能靠太阳和星星的位置辨认方向，如果遇到阴雨天，就会迷失方向。是中国人发明的指南针，帮助人们解决了这个难题。
指南针是指示方向的仪器。早在战国时期，中国人就发现了磁石指示南北的特性，并根据这种特性制成了指示方向的仪器--司南。司南由一把光滑的瓷勺和刻着方向的铜盘组成，勺把指示的方向是南方，勺头指示的方向是北方。到了宋代，人们把经过人工磁化的指南针和方位盘结合起来，制成了“罗盘”。有了罗盘，无论在什么情况下，人们都能准确地辨认方向了。
北宋时，指南针已开始应用于航海事业上。南宋时，指南针经由阿拉伯传到欧洲，当时的阿拉伯人亲切地称指南针为“水手之眼”。
指南针的发明，给航海事业带来了划时代的影响，世界航运史也由此翻开了新的一页。明朝初期郑和率领船队七下西洋，15世纪哥伦布发现新大陆和麦哲伦环绕地球航行等壮举，都是指南针用于航海事业的结果。`
            },
            {
                title: "南京之行 (天明与丽莎)",
                content: `张天明和丽莎上个学期末申请到中国学中文，原来以为时间会来不及，没想到学校竟很快就同意了。两个人可以在中国学习、生活三、四个月，这让他们非常高兴。
张天明和丽莎先到上海，然后坐高速火车去南京。火车很快，两个小时就到了。天明的表哥开车去火车站接他们。他们就住在姑妈家。
来中国前，天明的爸爸要他们一定去南京看看他以前的中学，拍几张照片发给他。于是到南京的第二天，一吃过早饭，表哥就带他们去找那个中学。没想到那儿已经变成了一个购物中心，完全不是爸爸说的那个样子了。表哥问了好几个人，谁也说不清楚那个中学搬到哪儿去了。天明想，爸爸总说自己是南京人，可是实际上他熟悉的那个南京已经没有了，今天的南京对他来说其实是一个完全陌生的地方。
虽然没找到爸爸的中学，但表哥很高兴地说愿意当导游，带他们继续在街上走走，让他们好好看看南京。
爸爸常常说南京是个很安静的城市，没想到这么热闹！你看到处都是新盖的高楼，大街上挤满了汽车。
这些年南京的变化的确很大，我以前骑自行车上班，现在也开起车来了。
这跟我以前想象的中国完全不一样。在上海的时候，要不是到处都是中文，我还以为是在美国呢。
我爸爸说，他小时候在南京很少看到外国人，可是现在，你看到处都是外国游客啊！
咱们不也是两个“老外”吗？哈哈！你看马路对面，美国快餐店，日本银行，法国服装店...
中国的大门打开了，中国融入世界了，这是件好事。
可是我担心，这样下去，有中国特色的东西会不会越来越少了？
不会的。南京还是保留了很多有中国特色的东西。比如说建筑，南京最有中国特色的是夫子庙，那儿还有吃的、喝的、玩儿的...
那咱们现在就去夫子庙，尝尝南京小吃吧。
好吧！不管中国怎么变，南京怎么变，肚子饿了要吃没变。你们听说过“民以食为天”这句话吗？
啊？什么？从来没听说过。
这句话的意思，简单地说就是，“吃”是老百姓生活中最重要的事儿。
好像挺有道理的。哎，天明，你看，那是什么地方？人那么多，旁边好像还卖吃的、玩儿的，五颜六色，真好看，真热闹！
那就是夫子庙啊。
看来，南京人真的是想尽可能保留老南京的特色，老南京的传统啊。
南京一边是一栋栋高楼大厦，一边是一座座传统建筑，站在这儿，我好像听到了一种声音。
什么声音？
历史的脚步声。晚上我给爸爸发一个电子邮件，告诉他中学已经找不到了，再把今天拍的照片发给他看看，不知道他看了会高兴还是会难过。
哎，我也听到了一种声音。
什么声音？
肚子咕噜咕噜叫的声音。走了这么多路，你们好像不累不饿，我这个导游可又渴又饿了。别忘了，“民以食为天”啊！走，吃饭去！`
            }
        ];

        // --- 2. DOM 元素获取 ---
        const articleSelect = document.getElementById('articleSelect');
        const textContentContainer = document.getElementById('textContent');
        const playBtn = document.getElementById('playBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const stopBtn = document.getElementById('stopBtn');
        const speedRate = document.getElementById('speedRate');
        const speedValue = document.getElementById('speedValue');
        const loopCheck = document.getElementById('loopCheck');

        // --- 3. 全局状态变量 ---
        let synth = window.speechSynthesis;
        let currentUtterance = null;
        let keepAliveUtterance = null; // 【核心修复】全局变量，防止 Chrome 垃圾回收导致 onend 失效
        let sentencesDOM = []; 
        let currentIndex = 0;
        let state = 'STOPPED'; 
        let isManualCancel = false;

        // --- 4. 核心功能实现 ---

        function initSelect() {
            articles.forEach((article, index) => {
                let option = document.createElement('option');
                option.value = index;
                option.textContent = article.title;
                articleSelect.appendChild(option);
            });
            
            articleSelect.addEventListener('change', (e) => {
                loadArticle(e.target.value);
            });
        }

        function parseTextToHTML(rawText) {
            const paragraphs = rawText.split('\n').filter(p => p.trim().length > 0);
            let htmlString = '';

            paragraphs.forEach(pText => {
                htmlString += `<p>`;
                const parts = pText.split(/([。！？；!?;]+)/g);
                
                let sentenceBuffer = '';
                for (let i = 0; i < parts.length; i++) {
                    const part = parts[i];
                    if (!part) continue;
                    
                    if (/^[。！？；!?;]+$/.test(part)) {
                        sentenceBuffer += part;
                        htmlString += `<span class="sentence">${sentenceBuffer}</span>`;
                        sentenceBuffer = ''; 
                    } else {
                        sentenceBuffer += part;
                        if (i === parts.length - 1 && sentenceBuffer.trim().length > 0) {
                            htmlString += `<span class="sentence">${sentenceBuffer}</span>`;
                            sentenceBuffer = '';
                        }
                    }
                }
                htmlString += `</p>`;
            });

            return htmlString;
        }

        function loadArticle(index) {
            stopPlayback();
            const article = articles[index];
            textContentContainer.innerHTML = parseTextToHTML(article.content);
            sentencesDOM = document.querySelectorAll('.sentence');
            currentIndex = 0;
            textContentContainer.scrollTop = 0;
        }

        function updateButtons() {
            if (state === 'STOPPED') {
                playBtn.disabled = false;
                pauseBtn.disabled = true;
                stopBtn.disabled = true;
            } else if (state === 'PLAYING') {
                playBtn.disabled = true;
                pauseBtn.disabled = false;
                stopBtn.disabled = false;
            } else if (state === 'PAUSED') {
                playBtn.disabled = false;
                pauseBtn.disabled = true;
                stopBtn.disabled = false;
            }
        }

        function removeHighlights() {
            sentencesDOM.forEach(s => s.classList.remove('highlight'));
        }

        function speakSentence(index) {
            if (!sentencesDOM || sentencesDOM.length === 0) return;

            // 检查是否读完本篇文章
            if (index >= sentencesDOM.length) {
                if (loopCheck.checked) {
                    currentIndex = 0;
                    // 【修复缓冲】循环时留出一点时间防止引擎卡死
                    setTimeout(() => speakSentence(0), 500);
                } else {
                    stopPlayback();
                }
                return;
            }

            removeHighlights();
            const currentSpan = sentencesDOM[index];
            currentSpan.classList.add('highlight');
            
            currentSpan.scrollIntoView({ behavior: 'smooth', block: 'center' });

            currentUtterance = new SpeechSynthesisUtterance(currentSpan.textContent);
            currentUtterance.lang = 'zh-CN'; 
            currentUtterance.rate = parseFloat(speedRate.value);

            // 【核心修复】防止被 Chrome 引擎当成垃圾回收
            keepAliveUtterance = currentUtterance; 

            currentUtterance.onend = function() {
                if (isManualCancel) {
                    isManualCancel = false;
                    return;
                }
                if (state === 'PLAYING') {
                    currentIndex++;
                    // 【核心修复】加入 100ms 延迟，防止同步调用 speak() 导致引擎超载卡死
                    setTimeout(() => {
                        speakSentence(currentIndex);
                    }, 100);
                }
            };

            // 【核心修复】容错机制：如果意外出错，强制继续读下一句
            currentUtterance.onerror = function(e) {
                console.warn("SpeechSynthesis API Error: ", e);
                if (isManualCancel) {
                    isManualCancel = false;
                    return;
                }
                if (state === 'PLAYING') {
                    currentIndex++;
                    setTimeout(() => {
                        speakSentence(currentIndex);
                    }, 100);
                }
            };

            synth.speak(currentUtterance);
        }

        function stopPlayback() {
            state = 'STOPPED';
            isManualCancel = true;
            synth.cancel();
            removeHighlights();
            currentIndex = 0;
            updateButtons();
        }

        // --- 5. 事件绑定 ---

        playBtn.onclick = () => {
            if (state === 'STOPPED') {
                state = 'PLAYING';
                
                // 【核心修复】在开始前先 clear 一次可能卡在后台的进程
                synth.cancel();
                
                setTimeout(() => {
                    currentIndex = 0;
                    speakSentence(currentIndex);
                    updateButtons();
                }, 50);
                
            } else if (state === 'PAUSED') {
                state = 'PLAYING';
                synth.resume();
                updateButtons();
            }
        };

        pauseBtn.onclick = () => {
            if (state === 'PLAYING') {
                state = 'PAUSED';
                synth.pause();
                updateButtons();
            }
        };

        stopBtn.onclick = () => {
            stopPlayback();
        };

        speedRate.oninput = (e) => {
            speedValue.textContent = Number(e.target.value).toFixed(1);
        };

        speedRate.onchange = () => {
            if (state === 'PLAYING') {
                isManualCancel = true;
                synth.cancel();
                setTimeout(() => speakSentence(currentIndex), 100);
            }
        };

        window.onbeforeunload = () => {
            synth.cancel();
        };

        // --- 6. 初始运行 ---
        initSelect();
        loadArticle(0);

    </script>
</body>
</html>
