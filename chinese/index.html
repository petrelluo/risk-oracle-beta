<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中文阅读 - 语音朗读播放器</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg: #f1f5f9;
            --surface: #ffffff;
            --text-main: #334155;
            --highlight: #fef08a;
        }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .player-container {
            max-width: 800px;
            width: 100%;
            background: var(--surface);
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        /* 顶部文章选择器区域 */
        .header-bar {
            background: #f8fafc;
            padding: 15px 20px;
            border-bottom: 1px solid #cbd5e1;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header-bar select {
            flex-grow: 1;
            padding: 10px;
            font-size: 1.1rem;
            border: 2px solid #cbd5e1;
            border-radius: 6px;
            outline: none;
            cursor: pointer;
            font-family: inherit;
        }
        
        .header-bar select:focus {
            border-color: var(--primary);
        }

        /* 控制栏样式 */
        .controls-bar {
            background: #e2e8f0;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
            position: sticky;
            top: 0;
            z-index: 10;
            border-bottom: 1px solid #cbd5e1;
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: background 0.2s;
        }

        .btn:hover { background: var(--primary-hover); }
        .btn:disabled { background: #94a3b8; cursor: not-allowed; }

        .control-group {
            display: flex;
            align-items: center;
            gap: 10px;
            background: white;
            padding: 6px 12px;
            border-radius: 6px;
            border: 1px solid #cbd5e1;
        }

        input[type="range"] { cursor: pointer; }
        
        .loop-control {
            display: flex;
            align-items: center;
            gap: 5px;
            font-weight: bold;
            cursor: pointer;
        }

        /* 文本区域样式 */
        .text-content {
            padding: 30px 40px;
            font-size: 1.15rem;
            line-height: 2;
            color: #1e293b;
            min-height: 300px;
            max-height: 60vh;
            overflow-y: auto;
            scroll-behavior: smooth;
        }

        p {
            margin-top: 0;
            margin-bottom: 1.5em;
            text-indent: 2em; /* 首行缩进 */
        }

        .sentence {
            transition: background-color 0.2s ease;
            border-radius: 3px;
            padding: 0 2px;
        }

        .sentence.highlight {
            background-color: var(--highlight);
            color: #000;
            box-shadow: 0 0 0 2px var(--highlight);
        }
    </style>
</head>
<body>

    <div class="player-container">
        
        <div class="header-bar">
            <label for="articleSelect" style="font-weight: bold; white-space: nowrap;">阅读篇目:</label>
            <select id="articleSelect"></select>
        </div>

        <div class="controls-bar">
            <button class="btn" id="playBtn">▶ 播放</button>
            <button class="btn" id="pauseBtn" disabled>⏸ 暂停</button>
            <button class="btn" id="stopBtn" disabled>⏹ 停止</button>
            
            <div class="control-group">
                <label for="speedRate">语速: <span id="speedValue">1.0</span>x</label>
                <input type="range" id="speedRate" min="0.5" max="2.0" step="0.1" value="1.0">
            </div>

            <label class="loop-control">
                <input type="checkbox" id="loopCheck" checked>
                循环播放
            </label>
        </div>

        <div class="text-content" id="textContent">
            </div>
    </div>

指南针是指示方向的仪器。早在战国时期，中国人就发现了磁石指示南北的特性，并根据这种特性制成了指示方向的仪器--司南。司南由一把光滑的瓷勺和刻着方向的铜盘组成，勺把指示的方向是南方，勺头指示的方向是北方。到了宋代，人们把经过人工磁化的指南针和方位盘结合起来，制成了“罗盘”。有了罗盘，无论在什么情况下，人们都能准确地辨认方向了。
北宋时，指南针已开始应用于航海事业上。南宋时，指南针经由阿拉伯传到欧洲，当时的阿拉伯人亲切地称指南针为“水手之眼”。

        // --- 2. DOM 元素获取 ---
        const articleSelect = document.getElementById('articleSelect');
        const textContentContainer = document.getElementById('textContent');
        const playBtn = document.getElementById('playBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const stopBtn = document.getElementById('stopBtn');
        const speedRate = document.getElementById('speedRate');
        const speedValue = document.getElementById('speedValue');
        const loopCheck = document.getElementById('loopCheck');

        // --- 3. 全局状态变量 (核心 Bug 修复区) ---
        let synth = window.speechSynthesis;
        let sentencesDOM = []; 
        let currentIndex = 0;
        let state = 'STOPPED'; 
        
        // 【防御性修复机制】
        let currentSessionId = 0; // 用于丢弃旧请求的 onend 事件
        let keepAliveArray = [];  // 强引用数组：专门用来防止 Chrome 的垃圾回收杀死语音对象

        // --- 4. 核心功能实现 ---

        function initSelect() {
            articles.forEach((article, index) => {
                let option = document.createElement('option');
                option.value = index;
                option.textContent = article.title;
                articleSelect.appendChild(option);
            });
            
            articleSelect.addEventListener('change', (e) => {
                loadArticle(e.target.value);
            });
        }

        function parseTextToHTML(rawText) {
            const paragraphs = rawText.split('\n').filter(p => p.trim().length > 0);
            let htmlString = '';

            paragraphs.forEach(pText => {
                htmlString += `<p>`;
                const parts = pText.split(/([。！？；!?;]+)/g);
                
                let sentenceBuffer = '';
                for (let i = 0; i < parts.length; i++) {
                    const part = parts[i];
                    if (!part) continue;
                    
                    if (/^[。！？；!?;]+$/.test(part)) {
                        sentenceBuffer += part;
                        htmlString += `<span class="sentence">${sentenceBuffer}</span>`;
                        sentenceBuffer = ''; 
                    } else {
                        sentenceBuffer += part;
                        if (i === parts.length - 1 && sentenceBuffer.trim().length > 0) {
                            htmlString += `<span class="sentence">${sentenceBuffer}</span>`;
                            sentenceBuffer = '';
                        }
                    }
                }
                htmlString += `</p>`;
            });

            return htmlString;
        }

        function loadArticle(index) {
            stopPlayback();
            const article = articles[index];
            textContentContainer.innerHTML = parseTextToHTML(article.content);
            sentencesDOM = document.querySelectorAll('.sentence');
            currentIndex = 0;
            textContentContainer.scrollTop = 0;
        }

        function updateButtons() {
            if (state === 'STOPPED') {
                playBtn.disabled = false;
                pauseBtn.disabled = true;
                stopBtn.disabled = true;
            } else if (state === 'PLAYING') {
                playBtn.disabled = true;
                pauseBtn.disabled = false;
                stopBtn.disabled = false;
            } else if (state === 'PAUSED') {
                playBtn.disabled = false;
                pauseBtn.disabled = true;
                stopBtn.disabled = false;
            }
        }

        function removeHighlights() {
            sentencesDOM.forEach(s => s.classList.remove('highlight'));
        }

        // 高度鲁棒的播放引擎
        function playFrom(index) {
            currentSessionId++; // 创建一个新纪元，旧的 onend 事件全部作废
            synth.cancel();     // 停止任何正在播放的内容
            
            currentIndex = index;
            state = 'PLAYING';
            updateButtons();
            
            // 给 Chrome 引擎 250ms 的喘息时间，防止 cancel 后立即 speak 导致系统卡死
            setTimeout(() => {
                if (state === 'PLAYING') {
                    speakSentence(currentIndex);
                }
            }, 250);
        }

        // 核心单句朗读函数
        function speakSentence(index) {
            if (!sentencesDOM || sentencesDOM.length === 0) return;

            // 检查是否读完本篇文章
            if (index >= sentencesDOM.length) {
                if (loopCheck.checked) {
                    playFrom(0); // 循环播放
                } else {
                    stopPlayback();
                }
                return;
            }

            removeHighlights();
            const currentSpan = sentencesDOM[index];
            currentSpan.classList.add('highlight');
            currentSpan.scrollIntoView({ behavior: 'smooth', block: 'center' });

            let utterance = new SpeechSynthesisUtterance(currentSpan.textContent);
            utterance.lang = 'zh-CN'; 
            utterance.rate = parseFloat(speedRate.value);

            // 【核心防御】：将对象推入数组，防止被浏览器 GC（垃圾回收）清理掉
            keepAliveArray.push(utterance);
            // 数组防溢出：只保留最近的 50 句，防止长期循环导致内存泄漏
            if (keepAliveArray.length > 50) keepAliveArray.shift();

            // 捕获当前的 Session，确保回调函数执行时，环境没被用户操作打断
            let capturedSessionId = currentSessionId;

            utterance.onend = function() {
                // 如果用户点击了停止、调整了语速、或切换了文章，Session ID 会改变，这里直接抛弃旧事件
                if (capturedSessionId !== currentSessionId) return; 
                
                if (state === 'PLAYING') {
                    currentIndex++;
                    // 加上 150ms 延迟，让浏览器处理队列，继续下一句
                    setTimeout(() => {
                        if (capturedSessionId === currentSessionId && state === 'PLAYING') {
                            speakSentence(currentIndex);
                        }
                    }, 150);
                }
            };

            // 容错：如果遇到乱码或其他原因导致引擎报错，直接跳到下一句
            utterance.onerror = function(e) {
                console.warn("SpeechSynthesis 遇到小错误，跳过当前句子: ", e);
                if (capturedSessionId !== currentSessionId) return;
                if (state === 'PLAYING') {
                    currentIndex++;
                    setTimeout(() => speakSentence(currentIndex), 150);
                }
            };

            synth.speak(utterance);
        }

        function stopPlayback() {
            currentSessionId++; // 废弃所有挂起的回调
            state = 'STOPPED';
            synth.cancel();
            removeHighlights();
            currentIndex = 0;
            keepAliveArray = []; // 清空防回收数组，释放内存
            updateButtons();
        }

        // --- 5. 事件绑定 ---

        playBtn.onclick = () => {
            if (state === 'STOPPED') {
                playFrom(0); // 从头开始全新会话
            } else if (state === 'PAUSED') {
                state = 'PLAYING';
                synth.resume();
                updateButtons();
            }
        };

        pauseBtn.onclick = () => {
            if (state === 'PLAYING') {
                state = 'PAUSED';
                synth.pause();
                updateButtons();
            }
        };

        stopBtn.onclick = () => {
            stopPlayback();
        };

        // 滑块文字实时反馈
        speedRate.oninput = (e) => {
            speedValue.textContent = Number(e.target.value).toFixed(1);
        };

        // 语速改变时，直接重启当前句子
        speedRate.onchange = () => {
            if (state === 'PLAYING') {
                playFrom(currentIndex);
            }
        };

        // 防止页面关闭/刷新时继续在后台发声
        window.onbeforeunload = () => {
            synth.cancel();
        };

        // --- 6. 初始运行 ---
        initSelect();
        loadArticle(0);

    </script>
