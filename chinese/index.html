<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中文学习 - 阅读与词汇播放器</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg: #f1f5f9;
            --surface: #ffffff;
            --text-main: #334155;
            --highlight: #fef08a;
            --tab-bg: #e2e8f0;
            --success: #10b981;
            --success-hover: #059669;
            --danger: #ef4444;
            --danger-hover: #dc2626;
        }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .player-container {
            max-width: 800px;
            width: 100%;
            background: var(--surface);
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* 顶部标签页 (Tabs) */
        .tabs {
            display: flex;
            background: var(--tab-bg);
            border-bottom: 1px solid #cbd5e1;
        }

        .tab-btn {
            flex: 1;
            padding: 15px 10px;
            border: none;
            background: none;
            font-size: 1.1rem;
            font-weight: bold;
            color: #64748b;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tab-btn:hover {
            background: #cbd5e1;
        }

        .tab-btn.active {
            background: var(--surface);
            color: var(--primary);
            box-shadow: inset 0 3px 0 0 var(--primary);
        }

        /* 顶部文章选择器区域 */
        .header-bar {
            background: #f8fafc;
            padding: 15px 20px;
            border-bottom: 1px solid #cbd5e1;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header-bar select {
            flex-grow: 1;
            padding: 10px;
            font-size: 1.1rem;
            border: 2px solid #cbd5e1;
            border-radius: 6px;
            outline: none;
            cursor: pointer;
            font-family: inherit;
        }
        
        .header-bar select:focus {
            border-color: var(--primary);
        }

        /* 控制栏样式 */
        .controls-bar {
            background: #f1f5f9;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            position: sticky;
            top: 0;
            z-index: 10;
            border-bottom: 1px solid #cbd5e1;
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: background 0.2s;
        }

        .btn:hover { background: var(--primary-hover); }
        .btn:disabled { background: #94a3b8; cursor: not-allowed; }
        
        .btn-outline {
            background: transparent;
            color: var(--primary);
            border: 2px solid var(--primary);
        }
        .btn-outline:hover {
            background: #eff6ff;
        }

        .btn-success { background: var(--success); }
        .btn-success:hover { background: var(--success-hover); }
        
        .btn-danger { background: var(--danger); }
        .btn-danger:hover { background: var(--danger-hover); }

        .control-group {
            display: flex;
            align-items: center;
            gap: 10px;
            background: white;
            padding: 6px 12px;
            border-radius: 6px;
            border: 1px solid #cbd5e1;
        }

        input[type="range"] { cursor: pointer; }
        
        .checkbox-control {
            display: flex;
            align-items: center;
            gap: 5px;
            font-weight: bold;
            cursor: pointer;
        }

        /* 文本区域样式 (阅读模式) */
        .text-content {
            padding: 30px 40px;
            font-size: 1.15rem;
            line-height: 2;
            color: #1e293b;
            min-height: 350px;
            max-height: 60vh;
            overflow-y: auto;
            scroll-behavior: smooth;
        }

        .text-content p {
            margin-top: 0;
            margin-bottom: 1.5em;
            text-indent: 2em; /* 首行缩进 */
        }

        .sentence {
            transition: background-color 0.2s ease;
            border-radius: 3px;
            padding: 0 2px;
        }

        .sentence.highlight {
            background-color: var(--highlight);
            color: #000;
            box-shadow: 0 0 0 2px var(--highlight);
        }

        /* 词汇闪卡区域样式 (词汇模式 & 测验模式) */
        .vocab-content {
            padding: 40px;
            min-height: 350px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #ffffff;
        }

        .vocab-card {
            width: 100%;
            max-width: 500px;
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            min-height: 250px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .v-word {
            font-size: 3.5rem;
            font-weight: bold;
            color: #0f172a;
            margin-bottom: 5px;
            letter-spacing: 2px;
        }

        .v-pinyin {
            font-size: 1.4rem;
            color: #64748b;
            margin-bottom: 25px;
            font-family: 'Courier New', Courier, monospace;
        }

        .v-meaning {
            font-size: 1.15rem;
            color: #334155;
            margin-bottom: 25px;
            font-weight: 500;
        }

        .v-example {
            font-size: 1.1rem;
            color: #1e293b;
            background: #e0f2fe;
            padding: 15px 20px;
            border-radius: 8px;
            text-align: left;
            border-left: 4px solid var(--primary);
            line-height: 1.6;
        }

        .vocab-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-top: 30px;
            width: 100%;
        }

        .v-progress {
            font-weight: bold;
            color: #64748b;
            min-width: 60px;
            text-align: center;
        }

        /* 测验进度条 */
        .quiz-progress-container {
            width: 100%;
            max-width: 500px;
            background: #e2e8f0;
            border-radius: 8px;
            height: 10px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .quiz-progress-bar {
            height: 100%;
            background: var(--success);
            width: 0%;
            transition: width 0.3s ease;
        }

        .hidden {
            display: none !important;
        }

        /* Multiple-choice quiz styles */
        .q-choices {
            width: 100%;
            max-width: 500px;
            display: grid;
            gap: 10px;
            margin-top: 18px;
        }

        .q-choice-btn {
            padding: 13px 18px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            background: #f8fafc;
            text-align: left;
            cursor: pointer;
            font-size: 0.95rem;
            color: #334155;
            transition: background 0.15s, border-color 0.15s;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            line-height: 1.5;
        }

        .q-choice-btn:hover:not(:disabled) {
            border-color: var(--primary);
            background: #eff6ff;
        }

        .q-choice-btn:disabled { cursor: default; }

        .q-choice-btn.correct {
            background: #d1fae5;
            border-color: var(--success);
            color: #065f46;
            font-weight: 700;
        }

        .q-choice-btn.wrong {
            background: #fee2e2;
            border-color: var(--danger);
            color: #991b1b;
        }

        .q-feedback {
            width: 100%;
            max-width: 500px;
            margin-top: 14px;
            padding: 14px 18px;
            border-radius: 10px;
            font-size: 0.9rem;
            line-height: 1.6;
        }

        .q-feedback.correct { background: #d1fae5; border-left: 4px solid var(--success); }
        .q-feedback.wrong   { background: #fee2e2; border-left: 4px solid var(--danger); }

        .q-feedback .q-fb-pinyin { color: #475569; font-family: 'Courier New', monospace; margin-bottom: 4px; }
        .q-feedback .q-fb-meaning { font-weight: 600; color: #1e293b; margin-bottom: 8px; }
        .q-feedback .q-fb-example { background: white; padding: 8px 12px; border-radius: 6px; border-left: 3px solid var(--primary); }
    </style>
</head>
<body>

    <div class="player-container">
        
        <div class="tabs">
            <button class="tab-btn active" id="tab-reading">📖 文章阅读</button>
            <button class="tab-btn" id="tab-vocab">🗂️ 词汇学习</button>
            <button class="tab-btn" id="tab-quiz">🧠 记忆测验</button>
        </div>

        <div id="section-reading">
            <div class="header-bar">
                <label for="articleSelect" style="font-weight: bold; white-space: nowrap;">阅读篇目:</label>
                <select id="articleSelect"></select>
            </div>

            <div class="controls-bar">
                <button class="btn" id="playBtn">▶ 播放全文</button>
                <button class="btn" id="pauseBtn" disabled>⏸ 暂停</button>
                <button class="btn" id="stopBtn" disabled>⏹ 停止</button>
                
                <div class="control-group">
                    <label for="speedRate">语速: <span id="speedValue">1.0</span>x</label>
                    <input type="range" id="speedRate" min="0.5" max="2.0" step="0.1" value="1.0">
                </div>

                <label class="checkbox-control">
                    <input type="checkbox" id="loopCheck" checked>
                    全文循环
                </label>
            </div>

            <div class="text-content" id="textContent">
            </div>
        </div>

        <div id="section-vocab" class="hidden">
            <div class="controls-bar" style="justify-content: space-between; background:#f8fafc;">
                <div style="display: flex; gap: 15px; flex-wrap: wrap;">
                    <label class="checkbox-control" style="color: var(--primary);">
                        <input type="checkbox" id="autoPlayVocab" checked>
                        🔊 切换时发音 (Auto-play)
                    </label>
                    <label class="checkbox-control" style="color: var(--primary);">
                        <input type="checkbox" id="autoAdvanceVocab" checked>
                        🔄 自动连播 (Auto-Advance)
                    </label>
                </div>
                
                <div class="control-group">
                    <label for="vocabSpeedRate">语速: <span id="vocabSpeedValue">1.0</span>x</label>
                    <input type="range" id="vocabSpeedRate" min="0.5" max="2.0" step="0.1" value="1.0">
                </div>
            </div>

            <div class="vocab-content">
                <div class="vocab-card">
                    <div class="v-word" id="vWord">多彩多姿</div>
                    <div class="v-pinyin" id="vPinyin">duō cǎi duō zī</div>
                    <div class="v-meaning" id="vMeaning">Colorful and diverse; rich and varied.</div>
                    <div class="v-example" id="vExample">例句：大自然的生活多彩多姿。</div>
                </div>

                <div class="vocab-controls">
                    <button class="btn btn-outline" id="vPrevBtn">⬅️ 上一个 (Prev)</button>
                    <span class="v-progress" id="vProgress">1 / 13</span>
                    <button class="btn btn-outline" id="vNextBtn">下一个 (Next) ➡️</button>
                    <button class="btn" id="vPlayBtn" style="margin-left: 10px;">🔊 朗读 (Play)</button>
                </div>
            </div>
        </div>

        <div id="section-quiz" class="hidden">
            <div class="controls-bar" style="justify-content: center; background:#f8fafc; flex-direction: column; gap: 5px;">
                <div style="font-size: 1.15rem; font-weight: bold; color: var(--text-main);">
                    掌握进度 (Mastered Progress): <span id="qMasteredCount" style="color: var(--success);">0</span> / <span id="qTotalCount">50</span>
                </div>
                <div class="quiz-progress-container">
                    <div class="quiz-progress-bar" id="qProgressBar"></div>
                </div>
            </div>

            <div class="vocab-content">
                <div class="vocab-card" id="qCard">
                    <div id="qCompleteMessage" class="hidden" style="font-size: 1.4rem; color: var(--success); font-weight: bold;">
                        🎉 恭喜！您已掌握所有词汇！<br>(Congratulations! All vocabulary mastered!)
                    </div>
                    <div id="qContentArea">
                        <div style="font-size: 0.85rem; color: #94a3b8; font-weight: 600; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em;">选择正确的意思 · Choose the correct meaning</div>
                        <div class="v-word" id="qWord" style="margin-bottom: 6px;"></div>
                        <div class="v-pinyin" id="qPinyin" style="margin-bottom: 0;"></div>
                    </div>
                </div>

                <!-- Multiple choice options injected here -->
                <div class="q-choices" id="qChoicesArea"></div>

                <!-- Feedback shown after answering -->
                <div class="q-feedback hidden" id="qFeedback">
                    <div class="q-fb-pinyin" id="qFbPinyin"></div>
                    <div class="q-fb-meaning" id="qFbMeaning"></div>
                    <div class="q-fb-example" id="qFbExample"></div>
                </div>

                <!-- Next button shown after answering -->
                <div class="vocab-controls hidden" id="qNextControls">
                    <button class="btn" id="qNextBtn" style="font-size: 1.1rem; padding: 10px 28px;">下一题 (Next) ➡️</button>
                </div>
            </div>
        </div>

    </div>

    <script>
        // ==========================================
        // 1. 数据配置
        // ==========================================
        
        // --- 文章列表 ---
        const articles = [
            {
                title: "指南针 (四大发明)",
                content: `指南针是中国古代“四大发明”之一。
在指南针发明以前，人们在茫茫大海上航行，只能靠太阳和星星的位置辨认方向，如果遇到阴雨天，就会迷失方向。是中国人发明的指南针，帮助人们解决了这个难题。
指南针是指示方向的仪器。早在战国时期，中国人就发现了磁石指示南北的特性，并根据这种特性制成了指示方向的仪器--司南。司南由一把光滑的瓷勺和刻着方向的铜盘组成，勺把指示的方向是南方，勺头指示的方向是北方。到了宋代，人们把经过人工磁化的指南针和方位盘结合起来，制成了“罗盘”。有了罗盘，无论在什么情况下，人们都能准确地辨认方向了。
北宋时，指南针已开始应用于航海事业上。南宋时，指南针经由阿拉伯传到欧洲，当时的阿拉伯人亲切地称指南针为“水手之眼”。
指南针的发明，给航海事业带来了划时代的影响，世界航运史也由此翻开了新的一页。明朝初期郑和率领船队七下西洋，15世纪哥伦布发现新大陆和麦哲伦环绕地球航行等壮举，都是指南针用于航海事业的结果。`
            },
            {
                title: "中国的变化 (天明与丽莎)",
                content: `张天明和丽莎上个学期末申请到中国学中文，原来以为时间会来不及，没想到学校竟很快就同意了。两个人可以在中国学习、生活三、四个月，这让他们非常高兴。
张天明和丽莎先到上海，然后坐高速火车去南京。火车很快，两个小时就到了。天明的表哥开车去火车站接他们。他们就住在姑妈家。
来中国前，天明的爸爸要他们一定去南京看看他以前的中学，拍几张照片发给他. 于是到南京的第二天，一吃过早饭，表哥就带他们去找那个中学。没想到那儿已经变成了一个购物中心，完全不是爸爸说的那个样子了。表哥问了好几个人，谁也说不清楚那个中学搬到哪儿去了。天明想，爸爸总说自己是南京人，可是实际上他熟悉的那个南京已经没有了，今天的南京对他来说其实是一个完全陌生的地方。
虽然没找到爸爸的中学，但表哥很高兴地说愿意当导游，带他们继续在街上走走，让他们好好看看南京。
爸爸常常说南京是个很安静的城市，没想到这么热闹！你看到处都是新盖的高楼，大街上挤满了汽车。
这些年南京的变化的确很大，我以前骑自行车上班，现在也开起车来了。
这跟我以前想象的中国完全不一样。在上海的时候，要不是到处都是中文，我还以为是在美国呢.
我爸爸说，他小时候在南京很少看到外国人，可是现在，你看到处都是外国游客啊！
咱们不也是两个“老外”吗？哈哈！你看马路对面，美国快餐店，日本银行，法国服装店...
中国的大门打开了，中国融入世界了，这是件好事。
可是我担心，这样下去，有中国特色的东西会不会越来越少了？
不会的。南京还是保留了很多有中国特色的东西。比如说建筑，南京最有中国特色的是夫子庙，那儿还有吃的、喝的、玩儿的...
那咱们现在就去夫子庙，尝尝南京小吃吧。
好吧！不管中国怎么变，南京怎么变，肚子饿了要吃没变。你们听说过“民以食为天”这句话吗？
啊？什么？从来没听说过。
这句话的意思，简单地说就是，“吃”是老百姓生活中最重要的事儿.
好像挺有道理的。哎，天明，你看，那是什么地方？人那么多，旁边好像还卖吃的、玩儿的，五颜六色，真好看，真热闹！
那就是夫子庙啊.
看来，南京人真的是想尽可能保留老南京的特色，老南京的传统啊.
南京一边是一栋栋高楼大厦，一边是一座座传统建筑，站在这儿，我好像听到了一种声音。
什么声音？
历史的脚步声. 晚上我给爸爸发一个电子邮件，告诉他中学已经找不到了，再把今天拍的照片发给他看看，不知道他看了会高兴还是会难过。
哎，我也听到了一种声音。
什么声音？
肚子咕噜咕噜叫的声音. 走了这么多路，你们好像不累不饿，我这个导游可又渴又饿了。别忘了，“民以食为天”啊！走，吃饭去！`
            },
            {
                title: "环保与大自然 (天明一行人的周末)",
                content: `张天明他们四个人来北京已经两三个月了，天气也逐渐暖和了. 他们每天上课的上课，找工作的找工作，半个月没见面了，更没有机会接近大自然。今天是星期六，大家都想轻松轻松，天明建议去爬山，丽莎和雪梅不反对，柯林也觉得这个建议不错，他说正好他的新朋友马克也想去。
可是怎么去呢？坐出租车吧，太贵，而且也没意思；坐公交车吧，人太多，太挤. 柯林想出了一个主意，骑自行车！大家马上就同意了，觉得骑自行车又能锻炼身体，又省钱，而且有益于环境保护。
他们早上很早就出发了. 骑了很长的一段路以后，有点热，也有点累，就下了车，一边推着车，一边聊了起来。
这儿的空气真新鲜！
对，比城里好多了. 到处都是绿色，看起来真舒服！
哎呀，渴死了，...你们看，一瓶水都喝完了！这儿有回收垃圾桶吗？空瓶子不能随便乱扔。
对，我们应该注意环保，回收垃圾桶就在树下边。
我好久没买瓶装水了. 我们班有的同学建议，为了保护绿色的地球，自己带水喝，不买瓶装水。
这个建议不错. 哎，你们看，那边房子上有些亮亮的东西，是什么？
是利用太阳能发电吧？我在美国也见过。
利用太阳能，太好了！
要是自行车也能利用太阳能发电，那多酷啊！
现在世界上很多国家都在闹能源危机，太阳能可是取之不尽的啊！
别忘了，风能也是取之不尽的。
如果全世界都利用太阳能和风能，那能节约多少石油和煤啊！而且...
环保！哈哈...
我听说中国政府规定办公室和公共场所，冬天暖气温度不能高于摄氏20度，夏天空调不能低于26度。
这个规定我举双手赞成. 你们还记得吗？我们美国学校的教室，冬天穿衬衫还出汗，夏天穿毛衣还冷得不得了。
可不是吗，太浪费了.
我听说现在不少人去餐厅吃饭自带餐具，不用一次性的。

                title: "熊猫虎子",
                content: `虎子开始从母亲身边溜走. 最初只是因为饥饿--一种本能促使它到处寻觅食物，后来则为了好奇而四处看看。虽然它不知道自己遥远的祖先曾是一只食肉兽，但食肉兽的某些特征却依然牢固地印刻在它身上. 它有锐利的爪子和虎牙，特别是上颌的最后一颗前臼齿和下颌的第一颗臼齿还都保留着强大裂齿的形态特征。这些都是它原始祖先专门用来食肉的结构. 尽管它还未尝试过热血和肉的味道，但是它的祖先经过几千万年所形成的那种对于肉食追求的欲望，却仍然遗留在它深层的记忆之中.

它无声无息地沿着林灌的间歇走着，听到了一阵啃咬竹茎的声音，在它面前不远的地方，一只灰色的竹鼠正在咬啮竹子. 它打算过去看个究竟，但竹鼠立即钻进地洞里去了。它用鼻子闻了闻洞口，竹鼠从洞里发出凶狠的喷息声，把它吓得往后一跳. 但那只竹鼠不敢走出洞穴，反而用土把洞口堵住，这就助长了它的勇气，它第一次知道还有比它弱小的动物。

接着，它看到一群金鸡在灌木丛中扒土，它肆无忌惮地走了过去，傻头傻脑地用鼻子去嗅闻它们，结果一只雄鸡在它的鼻子上啄了一下，并跳起来用爪子和翅膀狠狠抓打它的脸. 这突如其来的攻击使它蹲坐了下来，失声哭叫，它的叫声把所有的金鸡都吓跑了。这让它知道鸟类也是比它弱小的动物，它掉转了尾巴，傻傻地走开了.

它有生以来第一次走到小河边. 它只知道水可以解渴，但不懂的水还有其他的特性。当它大胆地踏了进去时，这才立刻惊叫起来. 流动的水迅速地把它带到了河中心，冰凉的水灌进它的嘴和鼻子里，使它感到窒息难耐。它稳不住身体，四脚离开河床，但毛茸茸的身体使它沉不下去而漂浮在水面上，它本能地挥动四肢游起水来. 在急流中一个漩涡打翻了它，使它在水中翻来覆去，或在岩石上磕磕撞撞，有时头朝下，肚朝上，有时又翻转过来，反反复复地冲向最湍急的河段，直到河水的拐弯处，它才被抛到一个小沙滩上.

在那里，它昏昏睡着，感到疲惫不堪，出生七个多月来还从未受到过这样的痛苦. 突然，它感到孤苦无援，腹中饥饿难忍，于是起身去找它的母亲。

它跌跌撞撞地沿着竹林中的小径小跑着，忽然看到一只云豹正咬住一只小鹿的脖子，使小鹿叫不出声来. 小鹿拼命踢踏着四蹄，皮上的毛溅落下来，不久便停止了挣扎。它听到云豹撕裂小鹿肚皮的声音，看到热乎乎的鲜血滴落在洁白的雪地上. 这情景更加刺激它的食欲，它悄悄地吞下口中流动的口涎，同时情不自禁地向前迈步，因为它还不知道危险。云豹看见这只傻头傻脑的熊猫崽向它走来，便从叼住小鹿的嘴中发出“呜呜”的警告声；虎子因为听不懂云豹的语言而继续往前走. 忽然，云豹发出嘘气声和高声的猫叫扑向它，并迅速伸出一只利爪，抓住它的额头，把它撕开了一道血口。它惊呆了，这才知道大祸临头，急忙转身逃跑，同时高声号叫，而云豹还在咆哮着追赶它. 就在万分紧急的时候，娇娇为寻找虎子恰好赶到这里，妈妈从竹丛中蹦跳出来，勇敢地截住了云豹，把云豹赶走.

虎子投入妈妈的怀抱，再次尝到了在妈妈身边的安全和妈妈的无限慈爱. 它用力将前爪抓住妈妈的颈脖，拥抱着，哭着，同时把这次离开妈妈之后的可怕经历深深地印在自己的记忆里。娇娇用鼻子抚慰它，用舌舐舔它的伤口，然后带它一起回到那片熟悉的小树林. 在那儿，娇娇把高大坚硬的巴山竹林从基部咬断，把整颗竹子平放在地上，希望能让幼崽吃到顶端那些最嫩、最适口的竹叶。但是虎子还是咬啮不断这些竹叶. 这时的竹子对它来说还只是玩具，不是食物。它迫不及待地转向妈妈，并全力吸吮着妈妈那鼓鼓胀胀的乳房，直到填饱了肚子，才心满意足地跟随妈妈来到一颗巨大的松树下面，倚着妈妈打盹.

            { word: "投入", pinyin: "tóu rù", meaning: "To throw oneself into; to devote oneself; to be absorbed in.", example: "她全身心地投入到了这份工作中。" },

            { word: "无限", pinyin: "wú xiàn", meaning: "Infinite; limitless; boundless; endless.", example: "大自然蕴藏着无限的奥秘等待探索。" },
            { word: "慈爱", pinyin: "cí ài", meaning: "Loving and kind; affectionate (especially of parents toward children).", example: "母亲用慈爱的目光注视着熟睡的孩子。" },
            { word: "适合", pinyin: "shì hé", meaning: "Suitable; appropriate; to fit; to be right for.", example: "这片竹林非常适合熊猫生活。" },
            { word: "迫不及待", pinyin: "pò bù jí dài", meaning: "Cannot wait; too impatient; eagerly; with great urgency.", example: "幼崽迫不及待地扑向了母亲。" },
            { word: "填饱", pinyin: "tián bǎo", meaning: "To fill up; to stuff full; to eat one's fill.", example: "熊猫每天要吃大量的竹子才能填饱肚子。" },
            { word: "抚慰", pinyin: "fǔ wèi", meaning: "To comfort; to soothe; to console.", example: "母亲轻声细语地抚慰着受惊的幼崽。" },
            { word: "熟悉", pinyin: "shú xī", meaning: "Familiar; to be acquainted with; to know well.", example: "它熟悉这片森林里的每一条小径。" },
            { word: "深深", pinyin: "shēn shēn", meaning: "Deeply; profoundly.", example: "妈妈深深地爱着她的孩子。" },
            { word: "顶端", pinyin: "dǐng duān", meaning: "The very top; apex; tip; summit.", example: "小松鼠爬到了大树的顶端。" },
            { word: "幼崽", pinyin: "yòu zǎi", meaning: "Cub; pup; young animal offspring.", example: "母熊在洞穴里照顾刚出生的幼崽。" },
            { word: "基部", pinyin: "jī bù", meaning: "The base; the bottom part; the root section.", example: "竹子的基部最为坚硬，难以咬断。" },
            { word: "咬断", pinyin: "yǎo duàn", meaning: "To bite off; to bite through; to sever with teeth.", example: "老鼠咬断了电线，导致停电。" },
            { word: "吸吮", pinyin: "xī shǔn", meaning: "To suck; to suckle; to draw in by sucking.", example: "小熊猫正在吸吮母亲的乳汁。" },
            { word: "倚着", pinyin: "yǐ zhe", meaning: "Leaning against; resting against.", example: "他倚着大树坐下来休息。" },
            { word: "鼓鼓掌掌", pinyin: "gǔ gǔ zhǎng zhǎng", meaning: "Plump; chubby; stuffed full; rounded and full.", example: "吃饱后，小熊猫的肚子鼓鼓掌掌的。" },
            { word: "打盹", pinyin: "dǎ dǔn", meaning: "To doze; to nap; to snooze; to take a short nap.", example: "老猫吃完饭后缩成一团打盹。" },
            { word: "颈脖", pinyin: "jǐng bó", meaning: "Neck; the neck area.", example: "小狗把头靠在主人的颈脖上。" },
            { word: "乳房", pinyin: "rǔ fáng", meaning: "Breast; mammary gland; udder.", example: "幼崽紧紧依偎在母亲的乳房旁吸吮乳汁。" },
            { word: "大祸临头", pinyin: "dà huò lín tóu", meaning: "A great disaster is imminent; catastrophe is about to strike.", example: "他感到大祸临头，却不知道该怎么办。" },
            { word: "警告", pinyin: "jǐng gào", meaning: "Warning; to warn; to caution.", example: "母熊发出低吼声，警告闯入者离开。" },
            { word: "迈步", pinyin: "mài bù", meaning: "To take a step; to stride forward.", example: "它鼓起勇气，迈步走向了陌生的森林。" },
            { word: "扭来扭去", pinyin: "niǔ lái niǔ qù", meaning: "To twist and turn; to wriggle; to squirm.", example: "被抱起的小猫扭来扭去想要逃脱。" },
            { word: "具有", pinyin: "jù yǒu", meaning: "To have; to possess; to be endowed with.", example: "熊猫具有黑白两色的独特外貌。" },
            { word: "挨饿", pinyin: "ái è", meaning: "To go hungry; to starve; to suffer from hunger.", example: "冬天食物稀少，许多动物不得不挨饿。" },
            { word: "渐渐", pinyin: "jiàn jiàn", meaning: "Gradually; little by little; bit by bit.", example: "天色渐渐暗了下来。" },
            { word: "棕色", pinyin: "zōng sè", meaning: "Brown; the color brown.", example: "秋天，树叶变成了深浅不一的棕色。" },
            { word: "捕捉", pinyin: "bǔ zhuō", meaning: "To catch; to capture; to seize.", example: "猫咪在草丛里捕捉蝴蝶。" },
            { word: "竹笋", pinyin: "zhú sǔn", meaning: "Bamboo shoot; young bamboo sprout.", example: "春天是竹笋生长最旺盛的季节。" },
            { word: "森林", pinyin: "sēn lín", meaning: "Forest; woods.", example: "大熊猫生活在中国西南部的竹子森林里。" },
            { word: "下肢", pinyin: "xià zhī", meaning: "Lower limbs; legs.", example: "长时间坐着会让下肢感到麻木。" },
            { word: "捡起来", pinyin: "jiǎn qǐ lái", meaning: "To pick up; to lift up from the ground.", example: "她把掉落在地上的幼崽轻轻捡起来。" }
        ];

        // ==========================================
        // 2. DOM 元素获取
        // ==========================================
        
        // Tabs
        const tabReadingBtn = document.getElementById('tab-reading');
        const tabVocabBtn = document.getElementById('tab-vocab');
        const tabQuizBtn = document.getElementById('tab-quiz');
        
        const sectionReading = document.getElementById('section-reading');
        const sectionVocab = document.getElementById('section-vocab');
        const sectionQuiz = document.getElementById('section-quiz');

        // Reading Elements
        const articleSelect = document.getElementById('articleSelect');
        const textContentContainer = document.getElementById('textContent');
        const playBtn = document.getElementById('playBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const stopBtn = document.getElementById('stopBtn');
        const speedRate = document.getElementById('speedRate');
        const speedValue = document.getElementById('speedValue');
        const loopCheck = document.getElementById('loopCheck');

        // Vocab Elements
        const vWord = document.getElementById('vWord');
        const vPinyin = document.getElementById('vPinyin');
        const vMeaning = document.getElementById('vMeaning');
        const vExample = document.getElementById('vExample');
        const vPrevBtn = document.getElementById('vPrevBtn');
        const vNextBtn = document.getElementById('vNextBtn');
        const vPlayBtn = document.getElementById('vPlayBtn');
        const vProgress = document.getElementById('vProgress');
        const autoPlayVocab = document.getElementById('autoPlayVocab');
        const autoAdvanceVocab = document.getElementById('autoAdvanceVocab'); 
        const vocabSpeedRate = document.getElementById('vocabSpeedRate');
        const vocabSpeedValue = document.getElementById('vocabSpeedValue');

        // Quiz Elements
        const qMasteredCount = document.getElementById('qMasteredCount');
        const qTotalCount = document.getElementById('qTotalCount');
        const qProgressBar = document.getElementById('qProgressBar');
        const qCompleteMessage = document.getElementById('qCompleteMessage');
        const qContentArea = document.getElementById('qContentArea');
        const qWord = document.getElementById('qWord');
        const qPinyin = document.getElementById('qPinyin');
        const qChoicesArea = document.getElementById('qChoicesArea');
        const qFeedback = document.getElementById('qFeedback');
        const qFbPinyin = document.getElementById('qFbPinyin');
        const qFbMeaning = document.getElementById('qFbMeaning');
        const qFbExample = document.getElementById('qFbExample');
        const qNextControls = document.getElementById('qNextControls');
        const qNextBtn = document.getElementById('qNextBtn');

        // ==========================================
        // 3. 全局状态变量
        // ==========================================
        let synth = window.speechSynthesis;
        
        // Reading State
        let sentencesDOM = []; 
        let currentReadIndex = 0;
        let readState = 'STOPPED'; 
        let currentSessionId = 0; 
        let keepAliveArray = [];  

        // Shuffle vocabulary for random flashcard order on every page load (Fisher-Yates)
        for (let i = vocabulary.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [vocabulary[i], vocabulary[j]] = [vocabulary[j], vocabulary[i]];
        }

        // Vocab State
        let currentVocabIndex = 0;
        let currentVocabSessionId = 0;

        // Quiz State (Spaced Repetition System)
        // box 0: new/forgotten, box 1, 2, 3: learning, box 4: mastered
        let quizData = vocabulary.map((v, index) => ({
            ...v,
            originalIndex: index,
            box: 0, 
            nextTime: 0 
        }));
        let currentQuizItem = null;

        // ==========================================
        // 4. Tabs 切换逻辑
        // ==========================================
        function switchTab(mode) {
            stopReadingPlayback();
            synth.cancel();
            currentVocabSessionId++; // 中断任何正在进行的词汇连播

            // 隐藏所有
            tabReadingBtn.classList.remove('active');
            tabVocabBtn.classList.remove('active');
            tabQuizBtn.classList.remove('active');
            sectionReading.classList.add('hidden');
            sectionVocab.classList.add('hidden');
            sectionQuiz.classList.add('hidden');

            if (mode === 'reading') {
                tabReadingBtn.classList.add('active');
                sectionReading.classList.remove('hidden');
                speedRate.value = vocabSpeedRate.value;
                speedValue.textContent = speedRate.value;
            } else if (mode === 'vocab') {
                tabVocabBtn.classList.add('active');
                sectionVocab.classList.remove('hidden');
                vocabSpeedRate.value = speedRate.value;
                vocabSpeedValue.textContent = vocabSpeedRate.value;
                renderVocabCard(true); 
            } else if (mode === 'quiz') {
                tabQuizBtn.classList.add('active');
                sectionQuiz.classList.remove('hidden');
                renderQuizCard();
            }
        }

        tabReadingBtn.onclick = () => switchTab('reading');
        tabVocabBtn.onclick = () => switchTab('vocab');
        tabQuizBtn.onclick = () => switchTab('quiz');

        // ==========================================
        // 5. 记忆测验 (Quiz - SRS, Multiple Choice) 核心功能
        // ==========================================
        function renderQuizCard() {
            // 1. 计算进度
            const total = quizData.length;
            const mastered = quizData.filter(item => item.box >= 4).length;

            qMasteredCount.textContent = mastered;
            qTotalCount.textContent = total;
            qProgressBar.style.width = `${(mastered / total) * 100}%`;

            // Reset feedback / next button
            qFeedback.classList.add('hidden');
            qNextControls.classList.add('hidden');
            qChoicesArea.innerHTML = '';

            // 2. 检查是否全部掌握
            if (mastered === total) {
                qContentArea.classList.add('hidden');
                qChoicesArea.innerHTML = '';
                qCompleteMessage.classList.remove('hidden');
                return;
            }

            // 3. 选择下一个要复习的词汇
            const now = Date.now();
            let unmastered = quizData.filter(item => item.box < 4);
            let dueCards = unmastered.filter(item => item.nextTime <= now);

            if (dueCards.length === 0) {
                unmastered.sort((a, b) => a.nextTime - b.nextTime);
                currentQuizItem = unmastered[0];
            } else {
                dueCards.sort((a, b) => a.nextTime - b.nextTime);
                currentQuizItem = dueCards[0];
            }

            // 4. 显示词语和拼音
            qWord.textContent = currentQuizItem.word;
            qPinyin.textContent = currentQuizItem.pinyin;

            // 5. 生成 4 个选项 (1 正确 + 3 随机错误)
            const wrongPool = quizData.filter(item => item.word !== currentQuizItem.word);
            const shuffledWrong = wrongPool.sort(() => Math.random() - 0.5).slice(0, 3);
            const choices = [...shuffledWrong, currentQuizItem].sort(() => Math.random() - 0.5);

            choices.forEach((choice) => {
                const btn = document.createElement('button');
                btn.className = 'q-choice-btn';
                btn.textContent = choice.meaning;
                btn.onclick = () => handleChoice(btn, choice, choices);
                qChoicesArea.appendChild(btn);
            });
        }

        function handleChoice(selectedBtn, chosenItem, allChoices) {
            const isCorrect = chosenItem.word === currentQuizItem.word;

            // Disable all buttons and highlight result
            const allBtns = qChoicesArea.querySelectorAll('.q-choice-btn');
            allBtns.forEach((btn, i) => {
                btn.disabled = true;
                if (allChoices[i].word === currentQuizItem.word) {
                    btn.classList.add('correct');
                }
            });
            if (!isCorrect) selectedBtn.classList.add('wrong');

            // Show full answer feedback
            qFbPinyin.textContent = currentQuizItem.pinyin;
            qFbMeaning.textContent = currentQuizItem.meaning;
            qFbExample.textContent = `例句：${currentQuizItem.example}`;
            qFeedback.className = `q-feedback ${isCorrect ? 'correct' : 'wrong'}`;
            qFeedback.classList.remove('hidden');

            // Auto-read the word
            synth.cancel();
            const wordUtt = new SpeechSynthesisUtterance(currentQuizItem.word);
            const exUtt = new SpeechSynthesisUtterance(currentQuizItem.example);
            wordUtt.lang = 'zh-CN'; exUtt.lang = 'zh-CN';
            wordUtt.rate = parseFloat(speedRate.value); exUtt.rate = parseFloat(speedRate.value);
            synth.speak(wordUtt);
            synth.speak(exUtt);

            // SRS: advance box on correct, reset on wrong
            if (isCorrect) {
                currentQuizItem.box++;
                const now = Date.now();
                if (currentQuizItem.box === 1)      currentQuizItem.nextTime = now + 15 * 1000;
                else if (currentQuizItem.box === 2) currentQuizItem.nextTime = now + 45 * 1000;
                else if (currentQuizItem.box === 3) currentQuizItem.nextTime = now + 120 * 1000;
            } else {
                currentQuizItem.box = 0;
                currentQuizItem.nextTime = Date.now() + 10 * 1000;
            }

            qNextControls.classList.remove('hidden');
        }

        qNextBtn.onclick = () => renderQuizCard();


        // ==========================================
        // 6. 词汇学习 (Vocabulary) 核心功能
        // ==========================================
        function renderVocabCard(isTabSwitch = false) {
            currentVocabSessionId++; 

            const vocab = vocabulary[currentVocabIndex];
            vWord.textContent = vocab.word;
            vPinyin.textContent = vocab.pinyin;
            vMeaning.textContent = vocab.meaning;
            vExample.textContent = `例句 (Example)：${vocab.example}`;
            
            vProgress.textContent = `${currentVocabIndex + 1} / ${vocabulary.length}`;

            vPrevBtn.disabled = (currentVocabIndex === 0);
            
            if (autoPlayVocab.checked || autoAdvanceVocab.checked) {
                playVocabAudio();
            }
        }

        function playVocabAudio() {
            currentVocabSessionId++; 
            let capturedSessionId = currentVocabSessionId; 

            synth.cancel(); 
            const vocab = vocabulary[currentVocabIndex];
            const rate = parseFloat(vocabSpeedRate.value);

            let wordUtt = new SpeechSynthesisUtterance(vocab.word);
            wordUtt.lang = 'zh-CN'; wordUtt.rate = rate;

            let exUtt = new SpeechSynthesisUtterance(vocab.example);
            exUtt.lang = 'zh-CN'; exUtt.rate = rate;

            exUtt.onend = function() {
                if (capturedSessionId !== currentVocabSessionId) return; 
                
                if (autoAdvanceVocab.checked) {
                    setTimeout(() => {
                        if (capturedSessionId !== currentVocabSessionId) return; 
                        if (!autoAdvanceVocab.checked) return; 
                        
                        if (currentVocabIndex < vocabulary.length - 1) {
                            currentVocabIndex++;
                        } else {
                            currentVocabIndex = 0; 
                        }
                        renderVocabCard();
                    }, 1500);
                }
            };

            exUtt.onerror = function(e) {
                if (capturedSessionId !== currentVocabSessionId) return;
                if (autoAdvanceVocab.checked) {
                    setTimeout(() => {
                        if (capturedSessionId !== currentVocabSessionId) return;
                        if (!autoAdvanceVocab.checked) return;
                        if (currentVocabIndex < vocabulary.length - 1) currentVocabIndex++;
                        else currentVocabIndex = 0;
                        renderVocabCard();
                    }, 1500);
                }
            };

            synth.speak(wordUtt);
            synth.speak(exUtt);
        }

        vPrevBtn.onclick = () => {
            if (currentVocabIndex > 0) {
                currentVocabIndex--;
                renderVocabCard();
            }
        };

        vNextBtn.onclick = () => {
            if (currentVocabIndex < vocabulary.length - 1) {
                currentVocabIndex++;
            } else {
                currentVocabIndex = 0; 
            }
            renderVocabCard();
        };

        vPlayBtn.onclick = () => playVocabAudio();

        vocabSpeedRate.oninput = (e) => vocabSpeedValue.textContent = Number(e.target.value).toFixed(1);

        autoAdvanceVocab.addEventListener('change', (e) => {
            if (e.target.checked) {
                playVocabAudio(); 
            } else {
                currentVocabSessionId++; 
            }
        });

        // ==========================================
        // 7. 文章阅读 (Reading) 核心功能 
        // ==========================================
        function initSelect() {
            articles.forEach((article, index) => {
                let option = document.createElement('option');
                option.value = index;
                option.textContent = article.title;
                articleSelect.appendChild(option);
            });
            articleSelect.addEventListener('change', (e) => {
                loadArticle(e.target.value);
            });
        }

        function parseTextToHTML(rawText) {
            const paragraphs = rawText.split('\n').filter(p => p.trim().length > 0);
            let htmlString = '';
            paragraphs.forEach(pText => {
                htmlString += `<p>`;
                const parts = pText.split(/([。！？；!?;]+)/g);
                let sentenceBuffer = '';
                for (let i = 0; i < parts.length; i++) {
                    const part = parts[i];
                    if (!part) continue;
                    
                    if (/^[。！？；!?;]+$/.test(part)) {
                        sentenceBuffer += part;
                        htmlString += `<span class="sentence">${sentenceBuffer}</span>`;
                        sentenceBuffer = ''; 
                    } else {
                        sentenceBuffer += part;
                        if (i === parts.length - 1 && sentenceBuffer.trim().length > 0) {
                            htmlString += `<span class="sentence">${sentenceBuffer}</span>`;
                            sentenceBuffer = '';
                        }
                    }
                }
                htmlString += `</p>`;
            });
            return htmlString;
        }

        function loadArticle(index) {
            stopReadingPlayback();
            const article = articles[index];
            textContentContainer.innerHTML = parseTextToHTML(article.content);
            sentencesDOM = document.querySelectorAll('.sentence');
            currentReadIndex = 0;
            textContentContainer.scrollTop = 0;
        }

        function updateReadingButtons() {
            if (readState === 'STOPPED') {
                playBtn.disabled = false;
                pauseBtn.disabled = true;
                stopBtn.disabled = true;
            } else if (readState === 'PLAYING') {
                playBtn.disabled = true;
                pauseBtn.disabled = false;
                stopBtn.disabled = false;
            } else if (readState === 'PAUSED') {
                playBtn.disabled = false;
                pauseBtn.disabled = true;
                stopBtn.disabled = false;
            }
        }

        function removeHighlights() {
            sentencesDOM.forEach(s => s.classList.remove('highlight'));
        }

        function playReadingFrom(index) {
            currentSessionId++; 
            synth.cancel();     
            currentReadIndex = index;
            readState = 'PLAYING';
            updateReadingButtons();
            
            setTimeout(() => {
                if (readState === 'PLAYING') speakReadingSentence(currentReadIndex);
            }, 250);
        }

        function speakReadingSentence(index) {
            if (!sentencesDOM || sentencesDOM.length === 0) return;

            if (index >= sentencesDOM.length) {
                if (loopCheck.checked) playReadingFrom(0); 
                else stopReadingPlayback();
                return;
            }

            removeHighlights();
            const currentSpan = sentencesDOM[index];
            currentSpan.classList.add('highlight');
            currentSpan.scrollIntoView({ behavior: 'smooth', block: 'center' });

            let utterance = new SpeechSynthesisUtterance(currentSpan.textContent);
            utterance.lang = 'zh-CN'; 
            utterance.rate = parseFloat(speedRate.value);

            keepAliveArray.push(utterance);
            if (keepAliveArray.length > 50) keepAliveArray.shift();

            let capturedSessionId = currentSessionId;

            utterance.onend = function() {
                if (capturedSessionId !== currentSessionId) return; 
                if (readState === 'PLAYING') {
                    currentReadIndex++;
                    setTimeout(() => {
                        if (capturedSessionId === currentSessionId && readState === 'PLAYING') {
                            speakReadingSentence(currentReadIndex);
                        }
                    }, 150);
                }
            };

            utterance.onerror = function(e) {
                if (capturedSessionId !== currentSessionId) return;
                if (readState === 'PLAYING') {
                    currentReadIndex++;
                    setTimeout(() => speakReadingSentence(currentReadIndex), 150);
                }
            };

            synth.speak(utterance);
        }

        function stopReadingPlayback() {
            currentSessionId++; 
            readState = 'STOPPED';
            synth.cancel();
            removeHighlights();
            currentReadIndex = 0;
            keepAliveArray = []; 
            updateReadingButtons();
        }

        playBtn.onclick = () => {
            if (readState === 'STOPPED') playReadingFrom(0); 
            else if (readState === 'PAUSED') {
                readState = 'PLAYING'; synth.resume(); updateReadingButtons();
            }
        };
        pauseBtn.onclick = () => {
            if (readState === 'PLAYING') {
                readState = 'PAUSED'; synth.pause(); updateReadingButtons();
            }
        };
        stopBtn.onclick = () => stopReadingPlayback();

        speedRate.oninput = (e) => speedValue.textContent = Number(e.target.value).toFixed(1);
        speedRate.onchange = () => { if (readState === 'PLAYING') playReadingFrom(currentReadIndex); };

        window.onbeforeunload = () => synth.cancel();

        // ==========================================
        // 8. 初始运行
        // ==========================================
        initSelect();
        loadArticle(0); 
        renderVocabCard(false); 
        renderQuizCard(); // 初始化测验数据

    </script>
</body>
