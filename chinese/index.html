<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中文学习 - 阅读与词汇播放器</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg: #f1f5f9;
            --surface: #ffffff;
            --text-main: #334155;
            --highlight: #fef08a;
            --tab-bg: #e2e8f0;
        }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .player-container {
            max-width: 800px;
            width: 100%;
            background: var(--surface);
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* 顶部标签页 (Tabs) */
        .tabs {
            display: flex;
            background: var(--tab-bg);
            border-bottom: 1px solid #cbd5e1;
        }

        .tab-btn {
            flex: 1;
            padding: 15px;
            border: none;
            background: none;
            font-size: 1.15rem;
            font-weight: bold;
            color: #64748b;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tab-btn:hover {
            background: #cbd5e1;
        }

        .tab-btn.active {
            background: var(--surface);
            color: var(--primary);
            box-shadow: inset 0 3px 0 0 var(--primary);
        }

        /* 顶部文章选择器区域 */
        .header-bar {
            background: #f8fafc;
            padding: 15px 20px;
            border-bottom: 1px solid #cbd5e1;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header-bar select {
            flex-grow: 1;
            padding: 10px;
            font-size: 1.1rem;
            border: 2px solid #cbd5e1;
            border-radius: 6px;
            outline: none;
            cursor: pointer;
            font-family: inherit;
        }
        
        .header-bar select:focus {
            border-color: var(--primary);
        }

        /* 控制栏样式 */
        .controls-bar {
            background: #f1f5f9;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            position: sticky;
            top: 0;
            z-index: 10;
            border-bottom: 1px solid #cbd5e1;
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: background 0.2s;
        }

        .btn:hover { background: var(--primary-hover); }
        .btn:disabled { background: #94a3b8; cursor: not-allowed; }
        
        .btn-outline {
            background: transparent;
            color: var(--primary);
            border: 2px solid var(--primary);
        }
        .btn-outline:hover {
            background: #eff6ff;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 10px;
            background: white;
            padding: 6px 12px;
            border-radius: 6px;
            border: 1px solid #cbd5e1;
        }

        input[type="range"] { cursor: pointer; }
        
        .checkbox-control {
            display: flex;
            align-items: center;
            gap: 5px;
            font-weight: bold;
            cursor: pointer;
        }

        /* 文本区域样式 (阅读模式) */
        .text-content {
            padding: 30px 40px;
            font-size: 1.15rem;
            line-height: 2;
            color: #1e293b;
            min-height: 350px;
            max-height: 60vh;
            overflow-y: auto;
            scroll-behavior: smooth;
        }

        .text-content p {
            margin-top: 0;
            margin-bottom: 1.5em;
            text-indent: 2em; /* 首行缩进 */
        }

        .sentence {
            transition: background-color 0.2s ease;
            border-radius: 3px;
            padding: 0 2px;
        }

        .sentence.highlight {
            background-color: var(--highlight);
            color: #000;
            box-shadow: 0 0 0 2px var(--highlight);
        }

        /* 词汇闪卡区域样式 (词汇模式) */
        .vocab-content {
            padding: 40px;
            min-height: 350px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #ffffff;
        }

        .vocab-card {
            width: 100%;
            max-width: 500px;
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .v-word {
            font-size: 3.5rem;
            font-weight: bold;
            color: #0f172a;
            margin-bottom: 5px;
            letter-spacing: 2px;
        }

        .v-pinyin {
            font-size: 1.4rem;
            color: #64748b;
            margin-bottom: 25px;
            font-family: 'Courier New', Courier, monospace;
        }

        .v-meaning {
            font-size: 1.15rem;
            color: #334155;
            margin-bottom: 25px;
            font-weight: 500;
        }

        .v-example {
            font-size: 1.1rem;
            color: #1e293b;
            background: #e0f2fe;
            padding: 15px 20px;
            border-radius: 8px;
            text-align: left;
            border-left: 4px solid var(--primary);
            line-height: 1.6;
        }

        .vocab-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-top: 30px;
            width: 100%;
        }

        .v-progress {
            font-weight: bold;
            color: #64748b;
            min-width: 60px;
            text-align: center;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <div class="player-container">
        
        <div class="tabs">
            <button class="tab-btn active" id="tab-reading">📖 文章阅读 (Reading)</button>
            <button class="tab-btn" id="tab-vocab">🗂️ 词汇学习 (Vocabulary)</button>
        </div>

        <div id="section-reading">
            <div class="header-bar">
                <label for="articleSelect" style="font-weight: bold; white-space: nowrap;">阅读篇目:</label>
                <select id="articleSelect"></select>
            </div>

            <div class="controls-bar">
                <button class="btn" id="playBtn">▶ 播放全文</button>
                <button class="btn" id="pauseBtn" disabled>⏸ 暂停</button>
                <button class="btn" id="stopBtn" disabled>⏹ 停止</button>
                
                <div class="control-group">
                    <label for="speedRate">语速: <span id="speedValue">1.0</span>x</label>
                    <input type="range" id="speedRate" min="0.5" max="2.0" step="0.1" value="1.0">
                </div>

                <label class="checkbox-control">
                    <input type="checkbox" id="loopCheck" checked>
                    全文循环
                </label>
            </div>

            <div class="text-content" id="textContent">
            </div>
        </div>

        <div id="section-vocab" class="hidden">
            <div class="controls-bar" style="justify-content: space-between; background:#f8fafc;">
                <div style="display: flex; gap: 15px; flex-wrap: wrap;">
                    <label class="checkbox-control" style="color: var(--primary);">
                        <input type="checkbox" id="autoPlayVocab" checked>
                        🔊 切换时自动发音 (Auto-play Audio)
                    </label>
                    <label class="checkbox-control" style="color: var(--primary);">
                        <input type="checkbox" id="autoAdvanceVocab">
                        🔄 自动连播 (Auto-Advance)
                    </label>
                </div>
                
                <div class="control-group">
                    <label for="vocabSpeedRate">语速: <span id="vocabSpeedValue">1.0</span>x</label>
                    <input type="range" id="vocabSpeedRate" min="0.5" max="2.0" step="0.1" value="1.0">
                </div>
            </div>

            <div class="vocab-content">
                <div class="vocab-card">
                    <div class="v-word" id="vWord">多彩多姿</div>
                    <div class="v-pinyin" id="vPinyin">duō cǎi duō zī</div>
                    <div class="v-meaning" id="vMeaning">Colorful and diverse; rich and varied.</div>
                    <div class="v-example" id="vExample">例句：大自然的生活多彩多姿。</div>
                </div>

                <div class="vocab-controls">
                    <button class="btn btn-outline" id="vPrevBtn">⬅️ 上一个 (Prev)</button>
                    <span class="v-progress" id="vProgress">1 / 13</span>
                    <button class="btn btn-outline" id="vNextBtn">下一个 (Next) ➡️</button>
                    <button class="btn" id="vPlayBtn" style="margin-left: 10px;">🔊 朗读 (Play)</button>
                </div>
            </div>
        </div>

    </div>

    <script>
        // ==========================================
        // 1. 数据配置
        // ==========================================
        
        // --- 文章列表 ---
        const articles = [
            {
                title: "指南针 (四大发明)",
                content: `指南针是中国古代“四大发明”之一。
在指南针发明以前，人们在茫茫大海上航行，只能靠太阳和星星的位置辨认方向，如果遇到阴雨天，就会迷失方向。是中国人发明的指南针，帮助人们解决了这个难题。
指南针是指示方向的仪器。早在战国时期，中国人就发现了磁石指示南北的特性，并根据这种特性制成了指示方向的仪器--司南。司南由一把光滑的瓷勺和刻着方向的铜盘组成，勺把指示的方向是南方，勺头指示的方向是北方。到了宋代，人们把经过人工磁化的指南针和方位盘结合起来，制成了“罗盘”。有了罗盘，无论在什么情况下，人们都能准确地辨认方向了。
北宋时，指南针已开始应用于航海事业上。南宋时，指南针经由阿拉伯传到欧洲，当时的阿拉伯人亲切地称指南针为“水手之眼”。
指南针的发明，给航海事业带来了划时代的影响，世界航运史也由此翻开了新的一页。明朝初期郑和率领船队七下西洋，15世纪哥伦布发现新大陆和麦哲伦环绕地球航行等壮举，都是指南针用于航海事业的结果。`

            {
                title: "中国的变化 (天明与丽莎)",
                content: `张天明和丽莎上个学期末申请到中国学中文，原来以为时间会来不及，没想到学校竟很快就同意了。两个人可以在中国学习、生活三、四个月，这让他们非常高兴。
张天明和丽莎先到上海，然后坐高速火车去南京。火车很快，两个小时就到了。天明的表哥开车去火车站接他们。他们就住在姑妈家。

虽然没找到爸爸的中学，但表哥很高兴地说愿意当导游，带他们继续在街上走走，让他们好好看看南京。
爸爸常常说南京是个很安静的城市，没想到这么热闹！你看到处都是新盖的高楼，大街上挤满了汽车。
这些年南京的变化的确很大，我以前骑自行车上班，现在也开起车来了。
这跟我以前想象的中国完全不一样。在上海的时候，要不是到处都是中文，我还以为是在美国呢。
我爸爸说，他小时候在南京很少看到外国人，可是现在，你看到处都是外国游客啊！
咱们不也是两个“老外”吗？哈哈！你看马路对面，美国快餐店，日本银行，法国服装店...
中国的大门打开了，中国融入世界了，这是件好事。
可是我担心，这样下去，有中国特色的东西会不会越来越少了？
不会的。南京还是保留了很多有中国特色的东西。比如说建筑，南京最有中国特色的是夫子庙，那儿还有吃的、喝的、玩儿的...
那咱们现在就去夫子庙，尝尝南京小吃吧。
好吧！不管中国怎么变，南京怎么变，肚子饿了要吃没变。你们听说过“民以食为天”这句话吗？
啊？什么？从来没听说过。
这句话的意思，简单地说就是，“吃”是老百姓生活中最重要的事儿。
好像挺有道理的。哎，天明，你看，那是什么地方？人那么多，旁边好像还卖吃的、玩儿的，五颜六色，真好看，真热闹！
那就是夫子庙啊。

什么声音？
历史的脚步声。晚上我给爸爸发一个电子邮件，告诉他中学已经找不到了，再把今天拍的照片发给他看看，不知道他看了会高兴还是会难过。

            {
                title: "环保与大自然 (天明一行人的周末)",
                content: `张天明他们四个人来北京已经两三个月了，天气也逐渐暖和了。他们每天上课的上课，找工作的找工作，半个月没见面了，更没有机会接近大自然。今天是星期六，大家都想轻松轻松，天明建议去爬山，丽莎和雪梅不反对，柯林也觉得这个建议不错，他说正好他的新朋友马克也想去。
可是怎么去呢？坐出租车吧，太贵，而且也没意思；坐公交车吧，人太多，太挤。柯林想出了一个主意，骑自行车！大家马上就同意了，觉得骑自行车又能锻炼身体，又省钱，而且有益于环境保护。

环保！哈哈...

这个规定我举双手赞成。你们还记得吗？我们美国学校的教室，冬天穿衬衫还出汗，夏天穿毛衣还冷得不得了。
可不是吗，太浪费了。
我听说现在不少人去餐厅吃饭自带餐具，不用一次性的。

除了上餐馆自带筷子，买东西也得自己带包了。

对，地球是我们的家，我们应该好好保护它！

好！同意！

                content: `丽莎这个学期除了中文课以外还选了一门中国历史课。中国是世界文明古国之一，有文字记载的历史就有四千多年。为了对中国历史有更多的了解，她请李文带她去中国国家博物馆参观。张天明和柯林对中国历史也有兴趣，听说丽莎要参观博物馆，也要跟她们一起去。李文很高兴地答应了。

            synth.speak(exUtt);
        }

        vPrevBtn.onclick = () => {
            if (currentVocabIndex > 0) {
                currentVocabIndex--;
                renderVocabCard();
            }
        };

        vNextBtn.onclick = () => {
            // 手动点击下一个
            if (currentVocabIndex < vocabulary.length - 1) {
                currentVocabIndex++;
            } else {
                currentVocabIndex = 0; // 允许手动循环
            }
            renderVocabCard();
        };

        vPlayBtn.onclick = () => {
            playVocabAudio();
        };

        vocabSpeedRate.oninput = (e) => {
            vocabSpeedValue.textContent = Number(e.target.value).toFixed(1);
        };

        // 新增：监听自动连播复选框状态改变
        autoAdvanceVocab.addEventListener('change', (e) => {
            if (e.target.checked) {
                playVocabAudio(); // 勾选时立即开始播放当前词并启动连播流程
            } else {
                currentVocabSessionId++; // 取消勾选时，打断当前的连播计时器
            }
        });

        // ==========================================
        // 6. 文章阅读 (Reading) 核心功能 
        // ==========================================
        function initSelect() {
            articles.forEach((article, index) => {
                let option = document.createElement('option');
                option.value = index;
                option.textContent = article.title;
                articleSelect.appendChild(option);
            });
            articleSelect.addEventListener('change', (e) => {
                loadArticle(e.target.value);
            });
        }

        function parseTextToHTML(rawText) {
            const paragraphs = rawText.split('\n').filter(p => p.trim().length > 0);
            let htmlString = '';
            paragraphs.forEach(pText => {
                htmlString += `<p>`;
                const parts = pText.split(/([。！？；!?;]+)/g);
                let sentenceBuffer = '';
                for (let i = 0; i < parts.length; i++) {
                    const part = parts[i];
                    if (!part) continue;
                    
                    if (/^[。！？；!?;]+$/.test(part)) {
                        sentenceBuffer += part;
                        htmlString += `<span class="sentence">${sentenceBuffer}</span>`;
                        sentenceBuffer = ''; 
                    } else {
                        sentenceBuffer += part;
                        if (i === parts.length - 1 && sentenceBuffer.trim().length > 0) {
                            htmlString += `<span class="sentence">${sentenceBuffer}</span>`;
                            sentenceBuffer = '';
                        }
                    }
                }
                htmlString += `</p>`;
            });
            return htmlString;
        }

        function loadArticle(index) {
            stopReadingPlayback();
            const article = articles[index];
            textContentContainer.innerHTML = parseTextToHTML(article.content);
            sentencesDOM = document.querySelectorAll('.sentence');
            currentReadIndex = 0;
            textContentContainer.scrollTop = 0;
        }

        function updateReadingButtons() {
            if (readState === 'STOPPED') {
                playBtn.disabled = false;
                pauseBtn.disabled = true;
                stopBtn.disabled = true;
            } else if (readState === 'PLAYING') {
                playBtn.disabled = true;
                pauseBtn.disabled = false;
                stopBtn.disabled = false;
            } else if (readState === 'PAUSED') {
                playBtn.disabled = false;
                pauseBtn.disabled = true;
                stopBtn.disabled = false;
            }
        }

        function removeHighlights() {
            sentencesDOM.forEach(s => s.classList.remove('highlight'));
        }

        function playReadingFrom(index) {
            currentSessionId++; 
            synth.cancel();     
            currentReadIndex = index;
            readState = 'PLAYING';
            updateReadingButtons();
            
            setTimeout(() => {
                if (readState === 'PLAYING') {
                    speakReadingSentence(currentReadIndex);
                }
            }, 250);
        }

        function speakReadingSentence(index) {
            if (!sentencesDOM || sentencesDOM.length === 0) return;

            if (index >= sentencesDOM.length) {
                if (loopCheck.checked) {
                    playReadingFrom(0); 
                } else {
                    stopReadingPlayback();
                }
                return;
            }

            removeHighlights();
            const currentSpan = sentencesDOM[index];
            currentSpan.classList.add('highlight');
            currentSpan.scrollIntoView({ behavior: 'smooth', block: 'center' });

            let utterance = new SpeechSynthesisUtterance(currentSpan.textContent);
            utterance.lang = 'zh-CN'; 
            utterance.rate = parseFloat(speedRate.value);

            keepAliveArray.push(utterance);
            if (keepAliveArray.length > 50) keepAliveArray.shift();

            let capturedSessionId = currentSessionId;

            utterance.onend = function() {
                if (capturedSessionId !== currentSessionId) return; 
                if (readState === 'PLAYING') {
                    currentReadIndex++;
                    setTimeout(() => {
                        if (capturedSessionId === currentSessionId && readState === 'PLAYING') {
                            speakReadingSentence(currentReadIndex);
                        }
                    }, 150);
                }
            };

            utterance.onerror = function(e) {
                console.warn("SpeechSynthesis 遇到小错误，跳过当前句子: ", e);
                if (capturedSessionId !== currentSessionId) return;
                if (readState === 'PLAYING') {
                    currentReadIndex++;
                    setTimeout(() => speakReadingSentence(currentReadIndex), 150);
                }
            };

            synth.speak(utterance);
        }

        function stopReadingPlayback() {
            currentSessionId++; 
            readState = 'STOPPED';
            synth.cancel();
            removeHighlights();
            currentReadIndex = 0;
            keepAliveArray = []; 
            updateReadingButtons();
        }

        // Reading Button Events
        playBtn.onclick = () => {
            if (readState === 'STOPPED') {
                playReadingFrom(0); 
            } else if (readState === 'PAUSED') {
                readState = 'PLAYING';
                synth.resume();
                updateReadingButtons();
            }
        };

        pauseBtn.onclick = () => {
            if (readState === 'PLAYING') {
                readState = 'PAUSED';
                synth.pause();
                updateReadingButtons();
            }
        };

        stopBtn.onclick = () => {
            stopReadingPlayback();
        };

        speedRate.oninput = (e) => {
            speedValue.textContent = Number(e.target.value).toFixed(1);
        };

        speedRate.onchange = () => {
            if (readState === 'PLAYING') {
                playReadingFrom(currentReadIndex);
            }
        };

        window.onbeforeunload = () => {
            synth.cancel();
        };

        // ==========================================
        // 7. 初始运行
        // ==========================================
        initSelect();
        loadArticle(0); // 默认加载第一篇文章
        renderVocabCard(false); // 预加载第一张单词卡片（不播放）

    </script>
</body>
</html>
