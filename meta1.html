<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Ad Campaign Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-main: #2d3436;
            --text-muted: #636e72;
            --primary-color: #0984e3;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 30px;
        }
        header {
            text-align: center;
            margin-bottom: 30px;
        }
        h1 {
            margin: 0 0 15px 0;
            font-size: 32px;
        }
        .controls {
            text-align: center;
            margin-bottom: 40px;
        }
        select {
            padding: 12px 24px;
            font-size: 18px;
            border-radius: 8px;
            border: 2px solid var(--primary-color);
            background-color: white;
            color: var(--text-main);
            cursor: pointer;
            outline: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        select:hover {
            border-color: #74b9ff;
        }
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 25px;
            max-width: 1400px;
            margin: 0 auto;
        }
        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 6px 12px rgba(0,0,0,0.04);
            border: 1px solid #edf2f7;
        }
        .card h2 {
            font-size: 18px;
            margin-top: 0;
            margin-bottom: 20px;
            text-align: center;
            color: var(--text-main);
            border-bottom: 2px solid var(--bg-color);
            padding-bottom: 10px;
        }
        .chart-container {
            position: relative;
            height: 300px;
            width: 100%;
        }
    </style>
</head>
<body>

    <header>
        <h1>Campaign Deep-Dive Dashboard</h1>
    </header>

    <div class="controls">
        <select id="campaignSelector" onchange="updateDashboard()">
            <option value="sat">SAT Vocabulary Books Campaign</option>
            <option value="fiji">Fiji Water Campaign</option>
        </select>
    </div>

    <div class="dashboard-grid">
        <div class="card">
            <h2>Impressions by Age</h2>
            <div class="chart-container"><canvas id="ageChart"></canvas></div>
        </div>
        <div class="card">
            <h2>Impressions by Gender</h2>
            <div class="chart-container"><canvas id="genderChart"></canvas></div>
        </div>
        <div class="card">
            <h2>Impressions by Device</h2>
            <div class="chart-container"><canvas id="deviceChart"></canvas></div>
        </div>
        <div class="card">
            <h2>Impressions by Platform / Placement</h2>
            <div class="chart-container"><canvas id="platformChart"></canvas></div>
        </div>
        <div class="card" style="grid-column: 1 / -1;">
            <h2>Top Regions (Impressions)</h2>
            <div class="chart-container" style="height: 400px;"><canvas id="regionChart"></canvas></div>
        </div>
    </div>

    <script>
        Chart.defaults.font.family = "'Segoe UI', Tahoma, Geneva, Verdana, sans-serif";
        Chart.defaults.color = '#636e72';

        // Aggregated data based on your reports
        const campaignData = {
            sat: {
                age: { labels: ['18-24', '25-34', '35-44', '45-54', '55-64', '65+'], data: [5, 126, 244, 111, 93, 177] },
                gender: { labels: ['Female', 'Male', 'Unknown'], data: [333, 415, 8] },
                device: { labels: ['Android Phone', 'iPhone', 'Android Tablet', 'iPad', 'Desktop', 'Other'], data: [537, 139, 20, 19, 11, 30] },
                platform: { labels: ['Facebook Feed', 'Unknown'], data: [748, 8] },
                region: { labels: ['California', 'Florida', 'Georgia', 'Kentucky', 'Michigan', 'Illinois', 'Mississippi'], data: [60, 45, 30, 29, 28, 23, 21] }
            },
            fiji: {
                age: { labels: ['18-24', '25-34', '35-44', '45-54', '55-64', '65+'], data: [3, 22, 35, 19, 7, 0] },
                gender: { labels: ['Female', 'Male', 'Unknown'], data: [34, 52, 0] },
                device: { labels: ['Android Phone', 'iPhone', 'Android Tablet', 'iPad', 'Desktop', 'Other'], data: [271, 116, 51, 11, 6, 1] },
                platform: { labels: ['Audience Network', 'Facebook Feed', 'IG Reels', 'FB Instream Video', 'FB Marketplace', 'FB Search', 'Other'], data: [244, 152, 35, 9, 6, 4, 6] },
                region: { labels: ['No Geographic Data in Report'], data: [0] }
            }
        };

        // Chart Instances
        let charts = {};

        function initCharts() {
            const commonOptions = { responsive: true, maintainAspectRatio: false };

            charts.age = new Chart(document.getElementById('ageChart'), {
                type: 'bar',
                data: { labels: [], datasets: [{ label: 'Impressions', backgroundColor: '#74b9ff', data: [] }] },
                options: { ...commonOptions, plugins: { legend: { display: false } } }
            });

            charts.gender = new Chart(document.getElementById('genderChart'), {
                type: 'doughnut',
                data: { labels: [], datasets: [{ backgroundColor: ['#fd79a8', '#0984e3', '#b2bec3'], data: [] }] },
                options: commonOptions
            });

            charts.device = new Chart(document.getElementById('deviceChart'), {
                type: 'pie',
                data: { labels: [], datasets: [{ backgroundColor: ['#00b894', '#6c5ce7', '#ffeaa7', '#fab1a0', '#81ecec', '#dfe6e9'], data: [] }] },
                options: { ...commonOptions, plugins: { legend: { position: 'right' } } }
            });

            charts.platform = new Chart(document.getElementById('platformChart'), {
                type: 'bar',
                data: { labels: [], datasets: [{ label: 'Impressions', backgroundColor: '#a29bfe', data: [] }] },
                options: { ...commonOptions, plugins: { legend: { display: false } } }
            });

            charts.region = new Chart(document.getElementById('regionChart'), {
                type: 'bar',
                data: { labels: [], datasets: [{ label: 'Impressions', backgroundColor: '#fdcb6e', data: [] }] },
                options: { ...commonOptions, indexAxis: 'y', plugins: { legend: { display: false } } }
            });

            updateDashboard(); // Load initial data
        }

        function updateDashboard() {
            const selected = document.getElementById('campaignSelector').value;
            const data = campaignData[selected];

            // Update Age Chart
            charts.age.data.labels = data.age.labels;
            charts.age.data.datasets[0].data = data.age.data;
            charts.age.update();

            // Update Gender Chart
            charts.gender.data.labels = data.gender.labels;
            charts.gender.data.datasets[0].data = data.gender.data;
            charts.gender.update();

            // Update Device Chart
            charts.device.data.labels = data.device.labels;
            charts.device.data.datasets[0].data = data.device.data;
            charts.device.update();

            // Update Platform Chart
            charts.platform.data.labels = data.platform.labels;
            charts.platform.data.datasets[0].data = data.platform.data;
            charts.platform.update();

            // Update Region Chart
            charts.region.data.labels = data.region.labels;
            charts.region.data.datasets[0].data = data.region.data;
            charts.region.update();
        }

        // Initialize on load
        window.onload = initCharts;
    </script>
</body>
</html>
